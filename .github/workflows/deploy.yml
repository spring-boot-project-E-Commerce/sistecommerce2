name: EC2 Spring Boot CI/CD

    # main 브랜치에 코드가 push(업데이트)될 때만 이 스크립트가 실행됨
    on:
      push:
        branches: [ "main" ]

    jobs:
      deploy:
        runs-on: ubuntu-latest

        steps:
        # 1. 깃허브 로봇이 내 코드를 복사해감
        - name: Checkout Repository
          uses: actions/checkout@v3

        # 2. 로봇의 컴퓨터에 자바 21 세팅
        - name: Set up JDK 21
          uses: actions/setup-java@v3
          with:
            java-version: '21'
            distribution: 'temurin'

        # 3. 그래들 빌드 권한 부여 및 빌드 (.jar 생성)
        - name: Build with Gradle
          run: |
            chmod +x gradlew
            ./gradlew clean build -x test

        # 4. 빌드된 .jar 파일을 EC2 서버로 전송 (아까 회원님이 하신 scp 역할)
        - name: Copy JAR to EC2
          uses: appleboy/scp-action@master
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_SSH_KEY }}
            source: "build/libs/*-SNAPSHOT.jar"
            target: "/home/ubuntu/build/libs/"
            strip_components: 2

        # 5. EC2에 원격 접속해서 도커 껐다 켜기
        - name: Execute Docker Commands on EC2
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              cd /home/ubuntu
              # 기존 도커 컨테이너 삭제
              docker rm -f my-shop || true
              # 최신 JAR 파일로 다시 도커 이미지 굽기
              docker build -t shop-app .
              # 새로운 앱 실행!
              docker run -d -p 8080:8080 --env-file .env --name my-shop shop-app