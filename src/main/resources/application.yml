spring:
  application:
    name: shop

  profiles:
    include: secret

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
      isolation-level-for-create: READ_COMMITTED


  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    database: oracle
    open-in-view: false
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        jdbc:
          time_zone: Asia/Seoul

  jackson:
    time-zone: Asia/Seoul

logging:
  level:
    org:
      hibernate:
        sql: debug
        orm:
          jdbc:
            bind: trace
          
cloudinary:
  cloud-name: 
  api-key: 
  api-secret: 
