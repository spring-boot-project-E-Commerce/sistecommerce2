<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Gold Market | 비밀번호 찾기')}"></head>

<body class="bg-[#f5f6f9] text-gray-900 font-sans antialiased min-h-screen">

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-screen-wide mx-auto px-4 py-16 flex justify-center">
    <div class="w-full max-w-md bg-white border border-gray-200 p-10">

        <h2 class="text-2xl font-black text-slate-900 mb-1">비밀번호 찾기</h2>
        <p class="text-xs text-gray-400 mb-8">가입 시 등록한 아이디와 이메일로 비밀번호 재설정 링크를 받을 수 있어요.</p>

        <!-- 발송 완료 메시지 -->
        <div th:if="${sent}"
             class="mb-6 bg-amber-50 border border-amber-200 px-4 py-3">
            <p class="text-xs text-amber-700 font-semibold">
                입력하신 정보가 확인되면 비밀번호 재설정 메일이 발송됩니다.<br>
                메일함을 확인해 주세요. (스팸 메일함도 확인해 보세요)
            </p>
        </div>

        <form th:action="@{/member/find-password}" method="post" class="space-y-5">
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-700">아이디</label>
                <input type="text" name="username"
                       class="w-full border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 transition-colors"
                       placeholder="아이디를 입력하세요" required>
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-700">이메일</label>
                <input type="email" name="email"
                       class="w-full border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 transition-colors"
                       placeholder="이메일을 입력하세요" required>
            </div>
            <button type="submit"
                    class="w-full bg-slate-900 hover:bg-amber-500 text-white hover:text-slate-900 font-bold text-sm py-3 transition-colors">
                재설정 메일 받기
            </button>
        </form>

        <div class="mt-6 flex items-center justify-center gap-4 text-xs text-gray-400">
            <a th:href="@{/member/login}" class="hover:text-amber-600">로그인</a>
            <span>|</span>
            <a th:href="@{/member/find-username}" class="hover:text-amber-600">아이디 찾기</a>
            <span>|</span>
            <a th:href="@{/member/signup/type}" class="hover:text-amber-600">회원가입</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
