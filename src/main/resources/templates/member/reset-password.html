<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Gold Market | 비밀번호 재설정')}"></head>

<body class="bg-[#f5f6f9] text-gray-900 font-sans antialiased min-h-screen">

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-screen-wide mx-auto px-4 py-16 flex justify-center">
    <div class="w-full max-w-md bg-white border border-gray-200 p-10">

        <h2 class="text-2xl font-black text-slate-900 mb-1">비밀번호 재설정</h2>

        <!-- 토큰 오류 -->
        <div th:if="${errorMsg}" class="mt-4 bg-red-50 border border-red-200 px-4 py-3">
            <p class="text-xs text-red-600" th:text="${errorMsg}"></p>
            <a th:href="@{/member/find-password}"
               class="inline-block mt-3 text-xs font-bold text-amber-600 hover:underline">
                비밀번호 찾기 다시 시도하기
            </a>
        </div>

        <!-- 비밀번호 입력 폼 (토큰 유효한 경우) -->
        <div th:if="${token}">
            <p class="text-xs text-gray-400 mb-8">
                <span class="font-semibold text-slate-700" th:text="${username}"></span>님의 새 비밀번호를 입력해 주세요.
            </p>

            <form th:action="@{/member/reset-password}" method="post" class="space-y-5"
                  onsubmit="return validateForm()">
                <input type="hidden" name="token" th:value="${token}">

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-700">새 비밀번호</label>
                    <input type="password" id="newPassword" name="newPassword"
                           class="w-full border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 transition-colors"
                           placeholder="새 비밀번호 (8자 이상)" minlength="8" required>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-700">새 비밀번호 확인</label>
                    <input type="password" id="confirmPassword"
                           class="w-full border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 transition-colors"
                           placeholder="비밀번호를 한 번 더 입력하세요" required>
                    <p id="pwMismatch" class="text-xs text-red-500 hidden mt-1">비밀번호가 일치하지 않습니다.</p>
                </div>

                <button type="submit"
                        class="w-full bg-slate-900 hover:bg-amber-500 text-white hover:text-slate-900 font-bold text-sm py-3 transition-colors">
                    비밀번호 변경
                </button>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>
    function validateForm() {
        const pw  = document.getElementById('newPassword').value;
        const pw2 = document.getElementById('confirmPassword').value;
        const msg = document.getElementById('pwMismatch');

        if (pw !== pw2) {
            msg.classList.remove('hidden');
            return false;
        }
        msg.classList.add('hidden');
        return true;
    }
</script>
</body>
</html>
