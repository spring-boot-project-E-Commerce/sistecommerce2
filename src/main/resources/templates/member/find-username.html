<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Gold Market | 아이디 찾기')}"></head>

<body class="bg-[#f5f6f9] text-gray-900 font-sans antialiased min-h-screen">

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-screen-wide mx-auto px-4 py-16 flex justify-center">
    <div class="w-full max-w-md bg-white border border-gray-200 p-10">

        <h2 class="text-2xl font-black text-slate-900 mb-1">아이디 찾기</h2>
        <p class="text-xs text-gray-400 mb-8">가입 시 등록한 이름과 이메일로 아이디를 찾을 수 있어요.</p>

        <!-- 입력 폼 -->
        <form th:action="@{/member/find-username}" method="post" class="space-y-5">
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-700">이름</label>
                <input type="text" name="name"
                       class="w-full border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 transition-colors"
                       placeholder="이름을 입력하세요" required>
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-700">이메일</label>
                <input type="email" name="email"
                       class="w-full border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 transition-colors"
                       placeholder="이메일을 입력하세요" required>
            </div>
            <button type="submit"
                    class="w-full bg-slate-900 hover:bg-amber-500 text-white hover:text-slate-900 font-bold text-sm py-3 transition-colors">
                아이디 찾기
            </button>
        </form>

        <!-- 조회 결과 -->
        <div th:if="${searched}" class="mt-8 border-t border-gray-100 pt-6">

            <!-- 결과 있음 -->
            <div th:if="${!#lists.isEmpty(results)}">
                <p class="text-xs font-bold text-gray-500 mb-3">조회된 아이디</p>
                <ul class="space-y-3">
                    <li th:each="result : ${results}"
                        class="flex items-center justify-between bg-amber-50 border border-amber-100 px-4 py-3">
                        <span class="text-sm font-bold text-slate-800 tracking-wide"
                              th:text="${result.maskedUsername}"></span>
                        <span class="text-xs text-gray-400"
                              th:text="'가입일 ' + ${#temporals.format(result.joinedAt, 'yyyy.MM.dd')}"></span>
                    </li>
                </ul>
            </div>

            <!-- 결과 없음 -->
            <div th:if="${#lists.isEmpty(results)}"
                 class="text-center py-6 text-sm text-gray-400">
                일치하는 아이디가 없습니다.
            </div>
        </div>

        <!-- 하단 링크 -->
        <div class="mt-6 flex items-center justify-center gap-4 text-xs text-gray-400">
            <a th:href="@{/member/login}" class="hover:text-amber-600">로그인</a>
            <span>|</span>
            <a href="#" class="hover:text-amber-600">비밀번호 찾기</a>
            <span>|</span>
            <a th:href="@{/member/signup/type}" class="hover:text-amber-600">회원가입</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
