<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>
    <h2>로그인</h2>

    <div th:if="${error}">
        <p th:text="${error}" style="color:red;"></p>
    </div>

    <form action="/member/login" method="post">
        <div>
            <label>아이디</label>
            <input type="text" name="username" />
        </div>
        <div>
            <label>비밀번호</label>
            <input type="password" name="password" />
        </div>
        <button type="submit">로그인</button>
    </form>
</body>
</html>
