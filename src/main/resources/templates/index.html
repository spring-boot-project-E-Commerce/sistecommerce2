<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메인</title>
</head>
<body>
    <h2>메인 페이지</h2>

    <div th:if="${loginMember != null}">
        <p><span th:text="${loginMember.name}"></span>님 로그인 성공!</p>
        <a href="/members/logout">로그아웃</a>
    </div>

    <div th:if="${loginMember == null}">
        <p>로그인이 필요합니다.</p>
        <a href="/members/login">로그인</a>
    </div>
</body>
</html>
