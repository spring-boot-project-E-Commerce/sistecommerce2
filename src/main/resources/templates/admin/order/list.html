<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>전체 주문 관리 - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin/style.css">
  <style>
    .theme-bg-body { background-color: var(--bg-body); }
    .theme-bg-panel { background-color: var(--bg-panel); }
    .theme-text-main { color: var(--text-main); }
    .theme-text-muted { color: var(--text-muted); }
    .theme-text-white { color: var(--text-white); }
    .theme-border { border-color: var(--border-color); }
  </style>
</head>
<body class="font-sans antialiased overflow-hidden theme-bg-body theme-text-main">
  <div class="flex h-screen w-screen relative">
    
    <div th:replace="~{admin/sidebar :: sidebar}"></div>
    
    <div class="flex-1 flex flex-col h-full overflow-hidden">
      <div th:replace="~{admin/header :: header}"></div>
      
      <main class="flex-1 overflow-y-auto p-4 md:p-8">
        
        <div class="flex justify-between items-center mb-6">
          <div>
            <h2 class="text-title text-2xl font-bold theme-text-white tracking-tight">전체 주문 관리</h2>
            <p class="text-label text-sm mt-1 theme-text-muted">쇼핑몰의 모든 주문 내역을 조회하고 관리합니다.</p>
          </div>
        </div>
        
        <!-- Search & Filter Card -->
        <div class="theme-bg-panel border theme-border rounded-xl p-5 mb-6 shadow-sm">
          <form th:action="@{/admin/order/list}" method="get" class="flex flex-col md:flex-row gap-4 items-end">
            
            <div class="flex-1 w-full relative">
              <label class="block text-xs font-semibold theme-text-muted mb-1.5 ml-1">회원 검색 (이름, 아이디, 닉네임)</label>
              <div class="relative">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="회원 이름, 아이디, 또는 닉네임 입력" 
                       class="w-full bg-black/5 dark:bg-white/5 border theme-border rounded-lg pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primary)] theme-text-main placeholder-gray-500 transition-all">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 theme-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                </div>
              </div>
            </div>
            
            <button type="submit" class="bg-[var(--primary)] hover:opacity-90 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-all shadow flex items-center gap-2 whitespace-nowrap">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              검색하기
            </button>
            <a th:href="@{/admin/order/list}" class="theme-bg-body border theme-border hover:opacity-80 px-4 py-2.5 rounded-lg text-sm font-medium transition-all flex items-center gap-2">
              초기화
            </a>
          </form>
        </div>
        
        <!-- Table Card -->
        <div class="theme-bg-panel border theme-border rounded-2xl shadow-sm overflow-hidden flex flex-col">
          <div class="p-4 border-b theme-border flex justify-between items-center bg-black/2 dark:bg-white/2">
            <h3 class="font-bold theme-text-white text-sm flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-[var(--primary)]"></span>
              검색 결과 <span class="theme-text-muted font-normal text-xs ml-1" th:text="'(총 ' + ${orders.totalElements} + '건)'"></span>
            </h3>
          </div>
          
          <div class="overflow-x-auto">
            <table class="w-full text-sm text-left whitespace-nowrap">
              <thead class="text-xs uppercase bg-black/5 dark:bg-white/5 theme-text-muted">
                <tr>
                  <th class="px-5 py-3.5 font-semibold">주문번호</th>
                  <th class="px-5 py-3.5 font-semibold text-center">회원 정보</th>
                  <th class="px-5 py-3.5 font-semibold">대표 주문상품</th>
                  <th class="px-5 py-3.5 font-semibold">주문일시</th>
                  <th class="px-5 py-3.5 font-semibold text-right">최종 결제금액</th>
                  <th class="px-5 py-3.5 font-semibold text-center">주문/결제 상태</th>
                  <th class="px-5 py-3.5 font-semibold text-center">관리</th>
                </tr>
              </thead>
              <tbody class="divide-y theme-border">
                <tr th:each="dto : ${orders.content}" class="hover:bg-black/5 dark:hover:bg-white/5 transition-colors group">
                  <td class="px-5 py-4">
                    <a th:href="@{/admin/order/{uid}(uid=${dto.order.orderUid})}" class="font-mono font-medium text-[var(--primary)] hover:underline" th:text="${dto.order.orderUid}">ORDER-123</a>
                  </td>
                  <td class="px-5 py-4 text-center">
                    <a th:href="@{/admin/member/{seq}(seq=${dto.order.memberSeq})}" class="inline-block px-2 py-0.5 theme-bg-body border theme-border rounded text-xs hover:bg-[var(--primary)]/10 hover:text-[var(--primary)] transition-colors whitespace-nowrap" th:text="${dto.memberName}">홍길동 (hong12)</a>
                  </td>
                  <td class="px-5 py-4 font-bold theme-text-main" th:text="${dto.representativeItemName}">상품명</td>
                  <td class="px-5 py-4 theme-text-muted text-xs" th:text="${dto.order.orderDate != null ? #temporals.format(dto.order.orderDate, 'yyyy-MM-dd HH:mm') : '-'}">2023-01-01</td>
                  <td class="px-5 py-4 font-bold text-right text-[var(--primary)]" th:text="${dto.order.finalPrice != null ? #numbers.formatInteger(dto.order.finalPrice, 0, 'COMMA') + '원' : '0원'}">10,000원</td>
                  <td class="px-5 py-4 text-center space-y-1">
                    <div>
                      <span th:if="${dto.order.orderStatus == 0}" class="badge text-xs px-2 py-0.5">주문생성</span>
                      <span th:if="${dto.order.orderStatus == 2}" class="badge badge-success text-xs px-2 py-0.5">결제완료</span>
                      <span th:if="${dto.order.orderStatus == 3}" class="badge text-xs px-2 py-0.5" style="background:rgba(59,130,246,0.1); color:#3b82f6;">상품준비중</span>
                      <span th:if="${dto.order.orderStatus == 5}" class="badge text-xs px-2 py-0.5" style="background:rgba(99,102,241,0.1); color:#6366f1;">배송중</span>
                      <span th:if="${dto.order.orderStatus == 6}" class="badge text-xs px-2 py-0.5" style="background:rgba(16,185,129,0.1); color:#10b981;">배송완료</span>
                    </div>
                  </td>
                  <td class="px-5 py-4 text-center">
                    <a th:href="@{/admin/order/{uid}(uid=${dto.order.orderUid})}" class="text-[var(--primary)] hover:text-indigo-400 text-xs font-medium">상세보기</a>
                  </td>
                </tr>
                <tr th:if="${orders.empty}">
                  <td colspan="7" class="px-5 py-16 text-center">
                    <div class="flex flex-col items-center justify-center">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 theme-text-muted mb-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                      </svg>
                      <p class="theme-text-muted font-medium">검색된 주문 내역이 없습니다.</p>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          
          <!-- Pagination -->
          <div class="p-4 border-t theme-border flex items-center justify-between bg-black/2 dark:bg-white/2" th:if="${!orders.empty}">
            <span class="text-xs theme-text-muted">
              Showing <span class="font-medium theme-text-main" th:text="${orders.number * orders.size + 1}">1</span> to 
              <span class="font-medium theme-text-main" th:text="${(orders.number + 1) * orders.size > orders.totalElements ? orders.totalElements : (orders.number + 1) * orders.size}">10</span> of 
              <span class="font-medium theme-text-main" th:text="${orders.totalElements}">97</span> entries
            </span>
            <div class="flex gap-1">
              <!-- Previous Page -->
              <a th:if="${orders.hasPrevious()}" 
                 th:href="@{/admin/order/list(page=${orders.number - 1}, keyword=${keyword})}"
                 class="px-3 py-1 border theme-border rounded hover:bg-black/5 dark:hover:bg-white/5 transition-colors text-sm theme-text-main">
                이전
              </a>
              <span th:unless="${orders.hasPrevious()}" class="px-3 py-1 border theme-border rounded opacity-50 cursor-not-allowed text-sm theme-text-muted">
                이전
              </span>

              <!-- Next Page -->
              <a th:if="${orders.hasNext()}" 
                 th:href="@{/admin/order/list(page=${orders.number + 1}, keyword=${keyword})}"
                 class="px-3 py-1 border theme-border rounded hover:bg-black/5 dark:hover:bg-white/5 transition-colors text-sm theme-text-main">
                다음
              </a>
              <span th:unless="${orders.hasNext()}" class="px-3 py-1 border theme-border rounded opacity-50 cursor-not-allowed text-sm theme-text-muted">
                다음
              </span>
            </div>
          </div>
        </div>
        
      </main>
      <script src="/admin/admin.js"></script>
    </div>
  </div>
</body>
</html>
