<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>주문 상세 정보 - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin/style.css">
  <style>
    .theme-bg-body { background-color: var(--bg-body); }
    .theme-bg-panel { background-color: var(--bg-panel); }
    .theme-text-main { color: var(--text-main); }
    .theme-text-muted { color: var(--text-muted); }
    .theme-text-white { color: var(--text-white); }
    .theme-border { border-color: var(--border-color); }
  </style>
</head>
<body class="font-sans antialiased overflow-hidden theme-bg-body theme-text-main">
  <div class="flex h-screen w-screen relative">

    <div th:replace="~{admin/sidebar :: sidebar}"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
      <div th:replace="~{admin/header :: header}"></div>

      <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
        <!-- Page Header -->
        <div class="flex justify-between items-center mb-6">
          <div>
            <div class="flex items-center gap-3">
              <a href="javascript:history.back()" class="p-2 theme-bg-panel hover:opacity-80 rounded-full transition-colors theme-text-muted hover:theme-text-white theme-border border">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
              </a>
              <h2 class="text-title text-2xl font-bold theme-text-white tracking-tight">주문 상세 정보</h2>
            </div>
            <p class="text-label text-sm mt-1 theme-text-muted ml-11">선택한 주문의 결제, 배송 및 상품 상세 내역입니다.</p>
          </div>
          <div class="flex gap-2">
            
          </div>
        </div>

        <!-- Order Summary Hero Card -->
        <div class="theme-bg-panel border theme-border rounded-2xl p-6 shadow-md relative overflow-hidden">
          <div class="absolute top-0 right-0 w-64 h-64 bg-[var(--primary)] opacity-5 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 relative z-10">
            <div>
              <p class="text-xs theme-text-muted mb-1 font-bold">주문번호</p>
              <h3 class="text-2xl font-mono font-extrabold theme-text-white flex items-center gap-3">
                <span th:text="${detail.order.orderUid}">ORDER-12345</span>
                <span th:if="${detail.order.orderStatus == 2}" class="badge badge-success text-sm px-3 py-1">결제완료</span>
                <span th:if="${detail.order.orderStatus == 0}" class="badge text-sm px-3 py-1">주문생성</span>
              </h3>
            </div>
            <div class="text-right">
              <p class="text-xs theme-text-muted mb-1 font-bold">주문 일시</p>
              <p class="text-lg font-medium theme-text-main" th:text="${detail.order.orderDate != null ? #temporals.format(detail.order.orderDate, 'yyyy년 MM월 dd일 HH:mm:ss') : '-'}">2023-01-01 12:00:00</p>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          
          <!-- Payment Info -->
          <div class="theme-bg-panel border theme-border rounded-2xl p-6 shadow-sm">
            <h4 class="theme-text-white font-bold mb-4 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              결제 정보
            </h4>
            <div class="space-y-4">
              <div class="grid grid-cols-3 border-b theme-border pb-3">
                <div class="theme-text-muted text-sm font-medium">상품 총액</div>
                <div class="col-span-2 theme-text-main text-sm font-medium text-right" th:text="${#numbers.formatInteger(detail.order.productTotalPrice, 0, 'COMMA')} + '원'"></div>
              </div>
              <div class="grid grid-cols-3 border-b theme-border pb-3">
                <div class="theme-text-muted text-sm font-medium">쿠폰 할인</div>
                <div class="col-span-2 text-red-400 text-sm font-medium text-right" th:text="'- ' + ${#numbers.formatInteger(detail.order.couponDiscount, 0, 'COMMA')} + '원'"></div>
              </div>
              <div class="grid grid-cols-3 border-b theme-border pb-3">
                <div class="theme-text-muted text-sm font-medium">핫딜 할인</div>
                <div class="col-span-2 text-red-400 text-sm font-medium text-right" th:text="'- ' + ${#numbers.formatInteger(detail.order.hotdealDiscount, 0, 'COMMA')} + '원'"></div>
              </div>
              <div class="grid grid-cols-3 pt-2">
                <div class="theme-text-white text-base font-bold">최종 결제 금액</div>
                <div class="col-span-2 text-[var(--primary)] text-xl font-bold text-right" th:text="${#numbers.formatInteger(detail.order.finalPrice, 0, 'COMMA')} + '원'"></div>
              </div>
            </div>
          </div>

          <!-- Member & Delivery Info -->
          <div class="theme-bg-panel border theme-border rounded-2xl p-6 shadow-sm">
            <h4 class="theme-text-white font-bold mb-4 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" /></svg>
              주문자 및 배송지 정보
            </h4>
            <div class="space-y-4">
              <div class="grid grid-cols-3 border-b theme-border pb-3">
                <div class="theme-text-muted text-sm font-medium">주문자</div>
                <div class="col-span-2 theme-text-main text-sm font-medium flex items-center gap-2">
                  <span th:if="${detail.member != null}" th:text="${detail.member.name} + ' (' + ${detail.member.username} + ')'"></span>
                  <span th:if="${detail.member == null}" class="text-red-400">탈퇴한 회원</span>
                  <a th:if="${detail.member != null}" th:href="@{/admin/member/{seq}(seq=${detail.member.seq})}" class="text-xs bg-[var(--primary)]/20 text-[var(--primary)] px-2 py-0.5 rounded hover:bg-[var(--primary)]/30">회원상세 보기</a>
                </div>
              </div>
              <div class="grid grid-cols-3 border-b theme-border pb-3">
                <div class="theme-text-muted text-sm font-medium">배송지 주소</div>
                <div class="col-span-2 theme-text-main text-sm font-medium">
                  <span class="inline-block px-2 py-0.5 theme-bg-body text-xs rounded border theme-border mb-1 font-mono" th:text="${detail.order.zipcode}"></span><br/>
                  <span th:text="${detail.order.address}"></span><br/>
                  <span class="theme-text-muted text-xs" th:text="${detail.order.addressDetail}"></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Order Items Table -->
        <div class="theme-bg-panel border theme-border rounded-2xl p-6 shadow-sm mt-6">
          <h4 class="theme-text-white font-bold mb-6 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
            주문 상품 내역
          </h4>
          
          <div class="overflow-x-auto rounded-lg border theme-border">
            <table class="w-full text-sm text-left whitespace-nowrap theme-text-main">
              <thead class="text-xs uppercase border-b theme-border theme-bg-body theme-text-muted">
                <tr>
                  <th class="px-4 py-3 font-medium text-center">상품 번호</th>
                  <th class="px-4 py-3 font-medium">상품명</th>
                  <th class="px-4 py-3 font-medium text-center">수량</th>
                  <th class="px-4 py-3 font-medium text-right">단가</th>
                  <th class="px-4 py-3 font-medium text-right text-red-400">할인(쿠폰/핫딜)</th>
                  <th class="px-4 py-3 font-medium text-right">최종 금액</th>
                  <th class="px-4 py-3 font-medium text-center">상태</th>
                </tr>
              </thead>
              <tbody class="divide-y theme-border">
                <tr th:each="item : ${detail.orderItems}" class="hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                  <td class="px-4 py-4 text-center font-mono theme-text-muted" th:text="${item.seq}"></td>
                  <td class="px-4 py-4 font-bold theme-text-white" th:text="${item.productName}"></td>
                  <td class="px-4 py-4 text-center font-medium" th:text="${item.quantity} + '개'"></td>
                  <td class="px-4 py-4 text-right theme-text-muted" th:text="${#numbers.formatInteger(item.originalPrice, 0, 'COMMA')} + '원'"></td>
                  <td class="px-4 py-4 text-right text-red-400 text-xs">
                    <span th:if="${item.couponDiscount > 0 or item.hotdealDiscount > 0}" th:text="'-' + ${#numbers.formatInteger(item.couponDiscount + item.hotdealDiscount, 0, 'COMMA')} + '원'"></span>
                    <span th:unless="${item.couponDiscount > 0 or item.hotdealDiscount > 0}">-</span>
                  </td>
                  <td class="px-4 py-4 font-bold text-right text-[var(--primary)]" th:text="${#numbers.formatInteger(item.subTotalPrice, 0, 'COMMA')} + '원'"></td>
                  <td class="px-4 py-4 text-center">
                    <span th:if="${item.itemStatus == 0}" class="badge badge-success">주문완료</span>
                    <span th:if="${item.itemStatus == 1}" class="badge" style="background:rgba(59,130,246,0.1); color:#3b82f6;">상품준비중</span>
                    <span th:if="${item.itemStatus == 2}" class="badge" style="background:rgba(99,102,241,0.1); color:#6366f1;">배송중</span>
                    <span th:if="${item.itemStatus == 3}" class="badge" style="background:rgba(16,185,129,0.1); color:#10b981;">배송완료</span>
                    <span th:if="${item.itemStatus == 6}" class="badge badge-danger">주문취소</span>
                    <span th:if="${item.itemStatus != 0 and item.itemStatus != 1 and item.itemStatus != 2 and item.itemStatus != 3 and item.itemStatus != 6}" class="badge" th:text="${item.itemStatus}"></span>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(detail.orderItems)}">
                  <td colspan="7" class="px-4 py-8 text-center theme-text-muted">
                    상품 내역이 존재하지 않습니다.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        
      </main>
      
      <script src="/admin/admin.js"></script>
      
    </div>
  </div>
</body>
</html>
