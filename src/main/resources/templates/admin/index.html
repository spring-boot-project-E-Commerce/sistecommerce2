<!DOCTYPE html>
<html lang="ko" >

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TailAdmin 콤팩트 대시보드 - 공통 CSS 적용</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <link rel="stylesheet" href="/admin/style.css">
</head>
<body class="font-sans antialiased overflow-hidden">

  <div class="flex h-screen w-screen relative">
    
    <aside id="sidebar" class="sidebar absolute inset-y-0 left-0 z-50 flex flex-col w-64 h-full px-4 py-6 overflow-y-auto transition-transform duration-300 ease-in-out transform -translate-x-full md:relative md:translate-x-0">
      
      <button id="sidebarClose" class="absolute top-6 right-4 text-[#8A99AF] hover:text-white md:hidden">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

      <div class="flex items-center gap-2 mb-10 px-4 mt-2 md:mt-0">
        <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold text-white">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"></path>
            <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"></path>
          </svg>
        </div>
        <span class="text-xl font-semibold text-white tracking-wide">TailAdmin</span>
      </div>

      <div class="flex flex-col gap-6">
        <div>
          <h3 class="menu-heading">MENU</h3>
          <ul class="flex flex-col gap-1.5">
            <li>
              <a href="#" class="menu-link active">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Dashboard
              </a>
              <div class="mt-2 ml-4">
                <a href="#" class="block px-4 py-2 text-sm font-medium text-white bg-[#333A48] rounded-sm">eCommerce</a>
              </div>
            </li>
            <li>
              <a href="#" class="menu-link">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Calendar
              </a>
            </li>
          </ul>
        </div>
      </div>
    </aside>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
      
      <header class="flex items-center justify-between px-4 py-4 md:px-6">
        <button id="sidebarToggle" class="btn btn-outline md:hidden p-1">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <button id="desktopSidebarToggle" class="hidden md:flex btn btn-outline p-1">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
      </header>

      <main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
        
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <div class="card">
            <div class="icon-box">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <div class="flex items-end justify-between">
              <div>
                <span class="text-label">Customers</span>
                <h4 class="text-value">3,782</h4>
              </div>
              <span class="badge badge-success">+11.01%</span>
            </div>
          </div>

          <div class="card">
            <div class="icon-box">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
            <div class="flex items-end justify-between">
              <div>
                <span class="text-label">Orders</span>
                <h4 class="text-value">5,359</h4>
              </div>
              <span class="badge badge-danger">-9.05%</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="flex justify-between items-center mb-4">
            <h4 class="text-title">Monthly Sales</h4>
          </div>
          <div id="monthly-sales-chart" class="w-full"></div> 
        </div>

        <div class="card">
          <div class="flex flex-col justify-between gap-4 mb-6 md:flex-row md:items-center">
            <div>
              <h4 class="text-title">Statistics</h4>
              <p class="text-label mt-1">Target you've set for each month</p>
            </div>
            <div class="flex items-center gap-4">
              <button class="btn btn-outline">May 27 - Jun 2</button>
            </div>
          </div>
          <div id="statistics-area-chart" class="w-full"></div>
        </div>

        <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
          <div class="card">
            <h4 class="text-title mb-4">Quick Form</h4>
            <form>
              <div class="form-group">
                <label class="text-label">Email Address</label>
                <input type="email" class="form-input" placeholder="Enter your email">
              </div>
              <div class="form-group">
                <label class="text-label">Password</label>
                <input type="password" class="form-input" placeholder="Enter password">
              </div>
              <button type="button" class="btn btn-primary mt-2">Submit Data</button>
            </form>
          </div>

          <div class="card">
            <h4 class="text-title mb-4">Recent Activity List</h4>
            <div class="list-container">
              <div class="list-item">
                <span class="text-label text-white">Project Update</span>
                <span class="badge badge-success">Completed</span>
              </div>
              <div class="list-item">
                <span class="text-label text-white">Server Maintenance</span>
                <span class="badge badge-danger">Failed</span>
              </div>
              <div class="list-item">
                <span class="text-label text-white">New User Registration</span>
                <span class="text-label">2m ago</span>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

 <script th:inline="javascript">
      document.addEventListener("DOMContentLoaded", function () {
        
        /* 1. 사이드바 토글 로직 */
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const desktopSidebarToggle = document.getElementById('desktopSidebarToggle');
        const sidebarClose = document.getElementById('sidebarClose');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
    
        sidebarToggle.addEventListener('click', () => {
          sidebar.classList.remove('-translate-x-full');
          sidebarOverlay.classList.remove('hidden');
        });
    
        const closeSidebar = () => {
          sidebar.classList.add('-translate-x-full');
          sidebarOverlay.classList.add('hidden');
        };
        
        sidebarClose.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);
    
        desktopSidebarToggle.addEventListener('click', () => {
          sidebar.classList.toggle('md:translate-x-0');
          sidebar.classList.toggle('md:-translate-x-full');
          if(sidebar.classList.contains('md:-translate-x-full')) {
            sidebar.classList.add('md:hidden');
          } else {
            setTimeout(() => sidebar.classList.remove('md:hidden'), 10);
          }
        });
    
        /* 2. 차트 렌더링 로직 (한 곳으로 통합) */
        
        // 백엔드에서 넘어온 데이터
        const backendSalesData = /*[[${salesData}]]*/ [];
    
        // 바 차트
        const salesBarOptions = {
          series: [{ name: 'Sales', data: backendSalesData }],
          chart: { type: 'bar', height: 240, toolbar: { show: false }, background: 'transparent' },
          plotOptions: { bar: { horizontal: false, columnWidth: '30%', borderRadius: 4 } },
          dataLabels: { enabled: false }, colors: ['#3C50E0'], theme: { mode: 'dark' },
          grid: { borderColor: '#313D4A', strokeDashArray: 4 },
          xaxis: { categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'], axisBorder: { show: false }, axisTicks: { show: false }, labels: { style: { colors: '#8A99AF' } } },
          yaxis: { labels: { style: { colors: '#8A99AF' } } },
          tooltip: { theme: 'dark' }
        };
        new ApexCharts(document.querySelector("#monthly-sales-chart"), salesBarOptions).render();
    
        // 영역 차트
        const statsAreaOptions = {
          series: [
            { name: 'Sales', data: [180, 190, 170, 160, 175, 165, 170, 200, 225, 210, 240, 235] },
            { name: 'Revenue', data: [40, 32, 50, 42, 55, 40, 70, 100, 110, 120, 150, 140] }
          ],
          chart: { type: 'area', height: 320, toolbar: { show: false }, background: 'transparent' },
          colors: ['#3C50E0', '#80CAEE'], stroke: { curve: 'smooth', width: 2 },
          fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.3, opacityTo: 0.0, stops: [0, 90, 100] } },
          dataLabels: { enabled: false }, theme: { mode: 'dark' },
          grid: { borderColor: '#313D4A', strokeDashArray: 4 },
          xaxis: { categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'], axisBorder: { show: false }, axisTicks: { show: false }, labels: { style: { colors: '#8A99AF' } } },
          yaxis: { min: 0, max: 250, tickAmount: 5, labels: { style: { colors: '#8A99AF' } } },
          tooltip: { theme: 'dark' }
        };
        new ApexCharts(document.querySelector("#statistics-area-chart"), statsAreaOptions).render();
        
      });
    </script>
</body>
</html>
