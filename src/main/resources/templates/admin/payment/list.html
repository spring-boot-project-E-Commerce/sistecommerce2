<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>판매처 정산 대금 관리 - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin/style.css">
  <style>
    .theme-bg-body { background-color: var(--bg-body); }
    .theme-bg-panel { background-color: var(--bg-panel); }
    .theme-text-main { color: var(--text-main); }
    .theme-text-muted { color: var(--text-muted); }
    .theme-text-white { color: var(--text-white); }
    .theme-border { border-color: var(--border-color); }
  </style>
</head>
<body class="font-sans antialiased overflow-hidden theme-bg-body theme-text-main">
  <div class="flex h-screen w-screen relative">
    
    <div th:replace="~{admin/sidebar :: sidebar}"></div>
    
    <div class="flex-1 flex flex-col h-full overflow-hidden">
      <div th:replace="~{admin/header :: header}"></div>
      
      <main class="flex-1 overflow-y-auto p-4 md:p-8">
        
        <div class="flex justify-between items-center mb-6">
          <div>
            <h2 class="text-title text-2xl font-bold theme-text-white tracking-tight">판매처 정산 대금 관리</h2>
            <p class="text-label text-sm mt-1 theme-text-muted">발주 완료된 내역에 대해 판매처로 지급할 대금을 관리합니다.</p>
          </div>
        </div>

        <!-- Search & Filter Card -->
        <div class="theme-bg-panel border theme-border rounded-xl p-5 mb-6 shadow-sm">
          <form th:action="@{/admin/payments}" method="get" class="flex flex-col md:flex-row gap-4 items-end">
            
            <div class="flex-1 w-full relative">
              <label class="block text-xs font-semibold theme-text-muted mb-1.5 ml-1">상세 검색 (판매처명, 발주 상품명)</label>
              <div class="relative">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="판매처명 또는 발주 상품명 입력" 
                       class="w-full bg-black/5 dark:bg-white/5 border theme-border rounded-lg pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primary)] theme-text-main placeholder-gray-500 transition-all">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 theme-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                </div>
              </div>
            </div>
            
            <button type="submit" class="bg-[var(--primary)] hover:opacity-90 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-all shadow flex items-center gap-2 whitespace-nowrap">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              검색하기
            </button>
            <a th:href="@{/admin/payments}" class="theme-bg-body border theme-border hover:opacity-80 px-4 py-2.5 rounded-lg text-sm font-medium transition-all flex items-center gap-2">
              초기화
            </a>
          </form>
        </div>
        
        <!-- Table Card -->
        <div class="theme-bg-panel border theme-border rounded-2xl shadow-sm overflow-hidden flex flex-col">
          <div class="p-4 border-b theme-border flex justify-between items-center bg-black/2 dark:bg-white/2">
            <h3 class="font-bold theme-text-white text-sm flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-[var(--primary)]"></span>
              정산 대금 목록
            </h3>
          </div>
          
          <div class="overflow-x-auto">
            <table class="w-full text-sm text-left whitespace-nowrap">
              <thead class="text-xs uppercase bg-black/5 dark:bg-white/5 theme-text-muted">
                <tr>
                  <th class="px-5 py-3.5 font-semibold text-center">번호</th>
                  <th class="px-5 py-3.5 font-semibold text-center">판매처명</th>
                  <th class="px-5 py-3.5 font-semibold text-center">계좌번호</th>
                  <th class="px-5 py-3.5 font-semibold">발주 상품</th>
                  <th class="px-5 py-3.5 font-semibold text-right">수량</th>
                  <th class="px-5 py-3.5 font-semibold text-right">공급가(단가)</th>
                  <th class="px-5 py-3.5 font-semibold text-right">총 정산액</th>
                  <th class="px-5 py-3.5 font-semibold text-center">구분</th>
                  <th class="px-5 py-3.5 font-semibold text-center">처리 상태</th>
                </tr>
              </thead>
              <tbody class="divide-y theme-border">
                <tr th:each="payment : ${payments}" class="hover:bg-black/5 dark:hover:bg-white/5 transition-colors group">
                  <td class="px-5 py-4 text-center font-mono text-xs theme-text-muted" th:text="${payment.seq}">1</td>
                  <td class="px-5 py-4 text-center font-bold theme-text-main" th:text="${payment.sellerName != null ? payment.sellerName : '-'}">판매처A</td>
                  <td class="px-5 py-4 text-center font-mono text-xs theme-text-muted" th:text="${payment.sellerAccount != null ? payment.sellerAccount : '-'}">123-456-789</td>
                  <td class="px-5 py-4">
                    <div class="font-medium theme-text-main" th:text="${payment.productName != null ? payment.productName : '-'}">상품명</div>
                    <div class="text-xs theme-text-muted mt-0.5">발주번호: <span th:text="${payment.purchaseOrderSeq != null ? payment.purchaseOrderSeq : '-'}"></span></div>
                  </td>
                  <td class="px-5 py-4 text-right" th:text="${payment.quantity != null ? #numbers.formatInteger(payment.quantity, 0, 'COMMA') + '개' : '0개'}">10개</td>
                  <td class="px-5 py-4 text-right" th:text="${payment.supplyPrice != null ? #numbers.formatInteger(payment.supplyPrice, 0, 'COMMA') + '원' : '0원'}">1,000원</td>
                  <td class="px-5 py-4 font-bold text-right text-[var(--primary)]" th:text="${payment.totalPrice != null ? #numbers.formatInteger(payment.totalPrice, 0, 'COMMA') + '원' : '0원'}">10,000원</td>
                  <td class="px-5 py-4 text-center">
                    <span class="px-2 py-1 rounded text-xs font-medium bg-gray-100 text-gray-800 dark:bg-gray-800 dark:text-gray-200" th:text="${payment.type}">발주</span>
                  </td>
                  <td class="px-5 py-4 text-center">
                    <select class="status-select bg-transparent border theme-border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-[var(--primary)]"
                            th:data-seq="${payment.seq}">
                      <option value="0" th:selected="${payment.status == 0}" class="text-gray-900 dark:text-white">미처리</option>
                      <option value="1" th:selected="${payment.status == 1}" class="text-green-600 dark:text-green-400">처리완료</option>
                    </select>
                  </td>
                </tr>
                <tr th:if="${payments.empty}">
                  <td colspan="9" class="px-5 py-16 text-center">
                    <div class="flex flex-col items-center justify-center">
                      <p class="theme-text-muted font-medium">정산 대금 내역이 없습니다.</p>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        
      </main>
      <script src="/admin/admin.js"></script>
      <script>
        document.querySelectorAll('.status-select').forEach(select => {
            select.addEventListener('change', function() {
                const seq = this.getAttribute('data-seq');
                const status = this.value;
                const originalValue = this.querySelector('option[selected]') ? this.querySelector('option[selected]').value : (status === '0' ? '1' : '0');

                if(!confirm(status === '1' ? '처리완료 상태로 변경하시겠습니까? (대금 지급 완료)' : '미처리 상태로 되돌리시겠습니까?')) {
                    this.value = originalValue;
                    return;
                }

                const formData = new URLSearchParams();
                formData.append('status', status);

                fetch(`/admin/payments/${seq}/status`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                })
                .then(res => {
                    if(res.ok) {
                        alert('상태가 변경되었습니다.');
                        location.reload();
                    } else {
                        alert('상태 변경에 실패했습니다.');
                        this.value = originalValue;
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('서버 통신 오류가 발생했습니다.');
                    this.value = originalValue;
                });
            });
        });
      </script>
    </div>
  </div>
</body>
</html>
