<aside th:fragment="sidebar" id="sidebar" class="sidebar absolute inset-y-0 left-0 z-50 flex flex-col w-64 h-full px-4 py-6 overflow-y-auto transition-transform duration-300 ease-in-out transform -translate-x-full md:relative md:translate-x-0">
      
      <button id="sidebarClose" class="absolute top-6 right-4 text-label hover:text-white md:hidden">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

      <div class="flex items-center gap-2 mb-10 px-4 mt-2 md:mt-0">
        <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold text-white">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"></path>
            <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"></path>
          </svg>
        </div>
        <span class="text-xl font-semibold text-title tracking-wide">Admin</span>
      </div>

      <div class="flex flex-col gap-6" th:with="role=${#authentication.principal.admRole}">
        
        <!-- 통계 그룹 -->
        <div>
          <h3 class="menu-heading">통계</h3>
          <ul class="flex flex-col gap-1.5">
            <li>
              <div class="flex items-center justify-between menu-link active cursor-pointer menu-toggle">
                <div class="flex items-center gap-2.5">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                  Dashboard
                </div>
                <svg class="w-4 h-4 transition-transform duration-200 arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
              <div class="hidden mt-2 ml-4 flex flex-col gap-1 overflow-hidden transition-all duration-300 submenu">
                 <!-- 공통 -->
                 <a href="/admin" class="submenu-link">메인통계</a>
                 <!-- CS, 인사, 회계, 최고관리자 -->
                 <a th:if="${role == 1 or role == 2 or role == 5}" href="/admin/statistics" class="submenu-link">정산 및 통계 대시보드</a>
              </div>
            </li>
          </ul>
        </div>
        
        <!-- 쇼핑몰 관리 그룹 -->
        <div>
          <h3 class="menu-heading">쇼핑몰 관리</h3>
          <ul class="flex flex-col gap-1.5">
            <li>
              <div class="flex items-center justify-between menu-link active cursor-pointer menu-toggle">
                <div class="flex items-center gap-2.5">
                 <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 7h12l-1 13H7L6 7z"/><path d="M9 7a3 3 0 0 1 6 0"/>
                </svg>
                    Market Management
                </div>
                <svg class="w-4 h-4 transition-transform duration-200 arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
               <div class="hidden mt-2 ml-4 flex flex-col gap-1 overflow-hidden transition-all duration-300 submenu">
                  <!-- 최고관리자(1) -->
                  <a th:if="${role == 1}" href="/admin/products" class="submenu-link">상품 관리</a>
                  <a th:if="${role == 1}" href="/admin/product-requests" class="submenu-link">상품요청 관리</a>
                  <a th:if="${role == 1}" href="/admin/seller/list" class="submenu-link">판매처 관리</a>
                  
                  <!-- CS관리자(2) + 최고관리자(1) -->
                  <a th:if="${role == 1 or role == 2}" href="/admin/member/list" class="submenu-link">회원 관리</a>
                  <a th:if="${role == 1 or role == 2}" href="/admin/coupon/list" class="submenu-link">쿠폰 관리</a>
                  <a th:if="${role == 1 or role == 2}" href="/admin/hotdeal/list" class="submenu-link">핫딜 관리</a>
                  <a th:if="${role == 1 or role == 2}" href="/admin/group-buys" class="submenu-link">공동구매 관리</a>
                  <a th:if="${role == 1 or role == 2}" href="/admin/group-buys/select" class="submenu-link">공동구매 추천상품</a>
                </div>
            </li>
          </ul>
        </div>

        <!-- 주문/재고/회계 관리 그룹 -->
        <div th:if="${role == 1 or role == 2 or role == 3 or role == 5}">
          <h3 class="menu-heading">운영 관리</h3>
          <ul class="flex flex-col gap-1.5">
            <li>
              <div class="flex items-center justify-between menu-link active cursor-pointer menu-toggle">
                <div class="flex items-center gap-2.5">
                 <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
                    Operation Management
                </div>
                <svg class="w-4 h-4 transition-transform duration-200 arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
               <div class="hidden mt-2 ml-4 flex flex-col gap-1 overflow-hidden transition-all duration-300 submenu">
                  <!-- CS(2), 인사/회계(5), 최고(1) -->
                  <a th:if="${role == 1 or role == 2 or role == 5}" href="/admin/order/list" class="submenu-link">주문 관리</a>
                  
                  <!-- 인사/회계(5), 최고(1) -->
                  <a th:if="${role == 1 or role == 5}" href="/admin/payments" class="submenu-link">발주 대금 목록</a>

                  <!-- 재고(3), 최고(1) -->
                  <a th:if="${role == 1 or role == 3}" href="/admin/inventories" class="submenu-link">재고 관리</a>
                  <a th:if="${role == 1 or role == 3}" href="/admin/stock-histories" class="submenu-link">재고 이력 관리</a>
                  <a th:if="${role == 1 or role == 3}" href="/admin/purchase-orders" class="submenu-link">발주 관리</a>
                </div>
            </li>
          </ul>
        </div>
      </div>
    </aside>
