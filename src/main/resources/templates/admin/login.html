<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm border border-gray-200">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-black text-slate-900 tracking-tight">ADMIN LOGIN</h1>
        <p class="text-gray-500 text-xs mt-1">관리자 전용 시스템입니다.</p>
    </div>

    <div th:if="${param.error}" class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-xs">
        아이디 또는 비밀번호를 확인해주세요. (비활성화 계정일 수 있습니다)
    </div>

    <div th:if="${param.logout}" class="mb-4 p-3 bg-green-50 border-l-4 border-green-500 text-green-700 text-xs">
        성공적으로 로그아웃 되었습니다.
    </div>

    <form th:action="@{/admin/login}" method="post" class="space-y-5">
        <div>
            <label for="username" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">ID</label>
            <input type="text" id="username" name="username" required placeholder="관리자 아이디"
                   class="block w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-slate-900 focus:border-slate-900">
        </div>

        <div>
            <label for="password" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">Password</label>
            <input type="password" id="password" name="password" required placeholder="비밀번호"
                   class="block w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-slate-900 focus:border-slate-900">
        </div>

        <div class="pt-2">
            <button type="submit"
                    class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 px-4 rounded text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900">
                로그인
            </button>
        </div>
        
        <div class="text-center pt-4 border-t border-gray-100">
            <a href="/" class="text-xs text-gray-400 hover:text-slate-900 underline">쇼핑몰 메인으로 돌아가기</a>
        </div>
    </form>
</div>

</body>
</html>
