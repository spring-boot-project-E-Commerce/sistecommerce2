<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Group Buy Create</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
</head>

<body class="bg-base-200">

	<div class="max-w-3xl mx-auto p-6">
	<div class="card bg-base-100 shadow-xl">
    <div class="card-body space-y-10">
        <!-- 상품 정보 -->
        <div>
            <div class="flex items-center gap-2 mb-4">
                <h2 class="font-bold text-lg">상품 정보</h2>
            </div>
            <div class="grid grid-cols-2 gap-4 text-sm">

                <div class="col-span-2">
				    <label class="label-text">상품명</label>
				    <input class="input input-bordered w-full"
				           th:value="${dto.productName}"
				           readonly />
				</div>
				
				<div class="col-span-2">
				    <div class="grid grid-cols-3 gap-4">
				
				        <div>
				            <label class="label-text">판매가</label>
				            <input class="input input-bordered w-full"
				                   th:value="${dto.originalPrice}"
				                   readonly />
				        </div>
				
				        <div>
				            <label class="label-text">공급가</label>
				            <input class="input input-bordered w-full"
				            	   id="supplyPrice"
				                   th:value="${dto.supplyPrice}"
				                   readonly />
				        </div>
				
				        <div>
				            <label class="label-text">할인가</label>
				            <input type="number"
			            		   id="finalPrice"
				                   name="finalPrice"
				                   class="input input-bordered w-full" />
				        </div>
				
				    </div>
				</div>

            </div>
        </div>

        <!-- 옵션 정보 -->
        <div>
		    <div class="flex items-center gap-2 mb-4">
		        <h2 class="font-bold text-lg">옵션 정보</h2>
		    </div>
		
		    <div class="space-y-4">
		
		        <div th:each="option : ${dto.options}">
		
		            <input type="hidden"
		                   name="optionSeqs"
		                   th:value="${option.optionSeq}">
		
		            <div class="grid grid-cols-3 gap-4">
		
		                <div>
		                    <label class="label-text">옵션명</label>
		                    <input class="input input-bordered w-full"
		                           th:value="${option.optionName}"
		                           readonly>
		                </div>
		
		                <div>
		                    <label class="label-text">추가금액</label>
		                    <input class="input input-bordered w-full"
		                           th:value="${option.additionalPrice}"
		                           readonly>
		                </div>
		
		                <div>
		                    <label class="label-text">공동구매 수량</label>
		                    <input type="number"
		                           name="orderQty"
		                           min="1"
		                           class="input input-bordered w-full order-qty">
		                </div>
		
		            </div>
		
		        </div>
		
		    </div>
		</div>

        <!-- 공동구매 정보 -->
        <div>
            <div class="flex items-center gap-2 mb-4">
                <h2 class="font-bold text-lg">공동구매 정보</h2>
            </div>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div>
                    <label class="label-text">최소 인원</label>
                    <input type="number"
                           name="minCount"
                           class="input input-bordered w-full" />
                </div>
                <div>
                    <label class="label-text">최대 인원</label>
                    <input type="number"
                    	   id="maxCount"
                           name="maxCount"
                           class="input input-bordered w-full" />
                </div>
                <div>
                    <label class="label-text">공동구매 시작일</label>
                    <input type="date"
                           name="startAt"
                           class="input input-bordered w-full" />
                </div>
                <div>
                    <label class="label-text">공동구매 종료일</label>
                    <input type="date"
                           name="endAt"
                           class="input input-bordered w-full" />
                </div>
            </div>
        </div>

        <!-- 판매처 정보 -->
        <div>
            <div class="flex items-center gap-2 mb-4">
                <h2 class="font-bold text-lg">판매처 정보</h2>
            </div>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div>
                    <label class="label-text">판매처</label>
                    <input class="input input-bordered w-full"
                           th:value="${dto.sellerName}"
                           readonly />
                </div>
                <div>
                    <label class="label-text">판매처 연락처</label>
                    <input class="input input-bordered w-full"
                           th:value="${dto.sellerPhone}"
                           readonly />
                </div>
            </div>
        </div>

        <!-- 버튼 -->
        <div class="flex justify-end gap-2">
            <button type="button"
                    class="btn btn-outline">
                취소
            </button>
            <button type="submit"
                    class="btn btn-primary">
                공동구매 등록
            </button>
        </div>

    </div>
</div>
</div>

<script>
	const finalPriceInput = document.getElementById("finalPrice");
	const supplyPrice = Number(document.getElementById("supplyPrice").value);
	
	finalPriceInput.addEventListener("change", function () {
	
	    const finalPrice = Number(this.value);
	
	    if (finalPrice < supplyPrice) {
	        alert("할인가는 공급가보다 낮을 수 없습니다.");
	        this.value = supplyPrice;
	    }
	});
	
	const qtyInputs = document.querySelectorAll(".order-qty");
	const maxCountInput = document.getElementById("maxCount");
	
	function getTotalQty() {
	
	    let total = 0;
	
	    qtyInputs.forEach(input => {
	        total += Number(input.value || 0);
	    });
	
	    return total;
	}
	
	function validateMaxCount() {
	
	    const totalQty = getTotalQty();
	    const maxCount = Number(maxCountInput.value || 0);
	
	    if (maxCount > totalQty) {
	        alert(`최대인원은 공동구매 수량 총합(${totalQty})을 초과할 수 없습니다.`);
	        maxCountInput.value = totalQty;
	    }
	}
	
	qtyInputs.forEach(input => {
	    input.addEventListener("input", validateMaxCount);
	});
	
	maxCountInput.addEventListener("change", validateMaxCount);
</script>

</body>
</html>
