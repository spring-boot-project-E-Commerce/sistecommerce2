<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Purchase Order List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/admin/style.css">
    <style>
	    .btn-more {
		  width: 100%;
		  justify-content: center;
		  padding: 0.75rem 1rem;
		  background-color: var(--bg-body);
		  border: 1px dashed var(--border-color);
		  color: var(--text-muted);
		  font-weight: 500;
		  transition: all 0.2s;
		}
		.btn-more:hover {
			  background-color: var(--bg-hover);
			  color: var(--text-white);
			  border-color: var(--text-muted);
		}
    </style>
</head>


<body class="font-sans antialiased overflow-hidden">

<div class="flex h-screen w-screen relative">
    <div th:replace="~{admin/sidebar :: sidebar}"></div>
    <div id="sidebarOverlay"
         class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity">
    </div>
    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <div th:replace="~{admin/header :: header}"></div>
        <main class="flex-1 overflow-y-auto p-6 space-y-6">
        
	    <h4 class="text-title mb-4">발주 관리</h4>
	    <!-- ================= 검색 영역 ================= -->
	    <div class="card">
	
	    <form method="get" th:action="@{/admin/purchase-orders}" class="space-y-4">
	
	        <!-- 1. 상태 -->
	        <div class="flex items-center gap-4">
	            <span class="text-label w-24">발주 상태</span>
	
	            <div class="flex gap-2">
	                <label class="filter-btn">
	                    <input type="radio" name="status"
	                    	value="" th:checked="${search.status == null}">
	                    전체
	                </label>
	
	                <label class="filter-btn">
	                    <input type="radio" name="status"
	                    	value="발주요청" th:checked="${search.status != null and search.status.name() == '발주요청'}">
	                    발주 요청
	                </label>
	
	                <label class="filter-btn">
	                    <input type="radio" name="status"
	                    	value="입고완료" th:checked="${search.status != null and search.status.name() == '입고완료'}">
	                    입고 완료
	                </label>
	
	                <label class="filter-btn">
	                    <input type="radio" name="status"
	                    	value="물품불량" th:checked="${search.status != null and search.status.name() == '물품불량'}">
	                    물품 불량
	                </label>
	            </div>
	        </div>
	
	        <!-- 2. 총금액 -->
	        <div class="flex items-center gap-4">
	            <span class="text-label w-24">총 금액</span>
	            <div class="flex items-center gap-2">
	                <input type="number" name="totalPriceFrom" class="form-input w-32">
	                <span class="text-label">원 이상 ~ </span>
	                <input type="number" name="totalPriceTo" class="form-input w-32">
	                <span class="text-label">원 이하</span>
	            </div>
	        </div>
	
	        <!-- 3. 발주일 -->
	        <div class="flex items-center gap-4">
	            <span class="text-label w-24">발주일</span>
	
	            <div class="flex items-center gap-2">
	                <input type="date" name="orderDateFrom" class="form-input">
	                <span class="text-label">~</span>
	                <input type="date" name="orderDateTo" class="form-input">
	            </div>
	        </div>
	
	        <!-- 4. 예정일 -->
	        <div class="flex items-center gap-4">
	            <span class="text-label w-24">예정일</span>
	
	            <div class="flex items-center gap-2">
	                <input type="date" name="expectedDateFrom" class="form-input">
	                <span class="text-label">~</span>
	                <input type="date" name="expectedDateTo" class="form-input">
	            </div>
	        </div>
	
	        <!-- 5. 검색 -->
	        <div class="flex items-center gap-4">
	            <span class="text-label w-24">검색</span>
	            <div class="flex gap-2 w-full">
	                <select name="keywordType" class="form-input w-40">
	                    <option value="">선택</option>
	                    <option value="product">상품명</option>
	                    <option value="option">옵션명</option>
	                </select>
	                <input type="text" name="keyword"
	                       class="form-input  w-[28rem]"
	                       placeholder="검색어 입력">
	                <button type="submit" class="btn btn-primary px-12 py-2 text-base">
	                    검색
	                </button>
	            </div>
	        </div>
	
	    </form>
	</div>
	
		<h4 class="text-title mb-4">발주 목록</h4>
		
	    <!-- ================= 상태 변경 버튼 ================= -->
	    <div class="flex flex-wrap gap-2">
	        <button class="btn btn-outline" onclick="updateSelectedStatus('입고완료')">선택 발주 입고완료</button>
	        <button class="btn btn-outline" onclick="updateSelectedStatus('물품불량')">선택 발주 물품불량</button>
	        <button class="btn btn-outline" onclick="updateSelectedStatus('입고지연')">선택 발주 입고지연</button>
	        <button class="btn btn-outline" onclick="updateSelectedStatus('지연입고')">선택 발주 지연입고</button>
	    </div>
	
	    <!-- ================= 테이블 ================= -->
	    <div class="card">    
	        <div class="overflow-x-auto">
	            <table class="w-full text-sm text-center">
	                <thead class="text-label border-b border-[var(--border-color)]">
	                <tr>
	                    <th class="p-2">
	                        <input type="checkbox" id="checkAll">
	                    </th>
	                    <th class="p-2">번호</th>
	                    <th class="p-2">상태</th>
	                    <th class="p-2">상품명</th>
	                    <th class="p-2">옵션</th>
	                    <th class="p-2">수량</th>
	                    <th class="p-2">총금액</th>
	                    <th class="p-2">발주일</th>
	                    <th class="p-2">예정일</th>
	                    <th class="p-2">입고일</th>
	                </tr>
	                </thead>
	
	                <tbody>
	                <tr th:each="item : ${list}" class="border-b border-[var(--border-color)]">
	                    <td class="p-2">
	                        <input type="checkbox"
	                               class="order-check"
	                               th:value="${item.seq}">
	                    </td>
	
	                    <td class="p-2" th:text="${item.seq}"></td>
	                    <td class="p-2" th:text="${item.status}"></td>
	                    <td class="p-2" th:text="${item.productName}"></td>
	                    <td class="p-2" th:text="${item.optionsName}"></td>
	                    <td class="p-2" th:text="${item.quantity}"></td>
	                    <td class="p-2"
	                        th:text="${#numbers.formatInteger(item.totalPrice, 3, 'COMMA') + '원'}"></td>
	                    <td class="p-2"
	                        th:text="${#temporals.format(item.orderDate, 'yyyy.MM.dd')}"></td>
	                    <td class="p-2"
	                        th:text="${#temporals.format(item.expectedDate, 'yyyy.MM.dd')}"></td>
	                    <td class="p-2"
	                        th:text="${item.receivedDate != null ? #temporals.format(item.receivedDate, 'yyyy.MM.dd') : '-'}"></td>
	                </tr>
	                </tbody>
	            </table>
	        </div>
	    </div>
	        <div class="mt-6">
			    <button id="loadMoreBtn" th:if="${hasNext}" class="btn btn-more">
			    	더보기
		    	</button>
			</div>
		</main>
	</div>
</div>

<script>
	document.addEventListener("DOMContentLoaded", function() {
	
	    const sidebar = document.getElementById('sidebar');
	    const sidebarToggle = document.getElementById('sidebarToggle');
	    const desktopSidebarToggle = document.getElementById('desktopSidebarToggle');
	    const sidebarClose = document.getElementById('sidebarClose');
	    const sidebarOverlay = document.getElementById('sidebarOverlay');
	
	    desktopSidebarToggle?.addEventListener('click', () => {
		    if (sidebar.classList.contains('hidden')) {
		        sidebar.classList.remove('hidden');
		    } else {
		        sidebar.classList.add('hidden');
		    }
		});
	
	    const closeSidebar = () => {
	        sidebar.classList.add('-translate-x-full');
	        sidebarOverlay.classList.add('hidden');
	    };
	
	    sidebarClose?.addEventListener('click', closeSidebar);
	    sidebarOverlay?.addEventListener('click', closeSidebar);
	
	    desktopSidebarToggle?.addEventListener('click', () => {
	        sidebar.classList.toggle('md:translate-x-0');
	        sidebar.classList.toggle('md:-translate-x-full');
	    });
	});
	
	const menuToggles = document.querySelectorAll('.menu-toggle');
	
	menuToggles.forEach(toggle => {
	    toggle.addEventListener('click', function() {	
	        const submenu = this.nextElementSibling;
	        const arrowIcon = this.querySelector('.arrow-icon');
	        submenu?.classList.toggle('hidden');
	        arrowIcon?.classList.toggle('rotate-180');
	    });
	});
	
	const themeToggle = document.getElementById('themeToggle');
	const themeIcon = document.getElementById('themeIcon');
	
	if (localStorage.getItem('theme') === 'light') {
	    document.body.classList.add('light-mode');
	    themeIcon.textContent = '🌙';
	}
	
	themeToggle?.addEventListener('click', () => {
	
	    document.body.classList.toggle('light-mode');
	
	    if (document.body.classList.contains('light-mode')) {
	        localStorage.setItem('theme', 'light');
	        themeIcon.textContent = '🌙';
	    } else {
	        localStorage.setItem('theme', 'dark');
	        themeIcon.textContent = '☀️';
	    }
	});

	let page = 1;
	
	const loadMoreBtn =
    document.getElementById("loadMoreBtn");	
	if (loadMoreBtn) {
	    loadMoreBtn.addEventListener("click", loadMore);
	}
	
	async function loadMore() {
	
	    const response =
	        await fetch(
	            `/api/purchase-orders?page=${page}`
	        );
	
	    const slice = await response.json();
	
	    const tbody =
	        document.querySelector("tbody");
	
	    slice.content.forEach(item => {
	
	        tbody.insertAdjacentHTML(
	            "beforeend",
	            `
	            <tr class="border-b border-[var(--border-color)]">
	                <td class="p-2">
	                    <input type="checkbox"
	                           class="order-check"
	                           value="${item.seq}">
	                </td>
	
	                <td class="p-2">${item.seq}</td>
	                <td class="p-2">${item.status}</td>
	                <td class="p-2">${item.productName}</td>
	                <td class="p-2">${item.optionsName}</td>
	                <td class="p-2">${item.quantity}</td>
	                <td class="p-2">
					    ${Number(item.totalPrice).toLocaleString()}원
					</td>
	                <td class="p-2">
					    ${item.orderDate ? item.orderDate.substring(0,10).replaceAll('-', '.') : '-'}
					</td>				
					<td class="p-2">
					    ${item.expectedDate ? item.expectedDate.substring(0,10).replaceAll('-', '.') : '-'}
					</td>
					<td class="p-2">
					    ${item.receivedDate ? item.receivedDate.substring(0,10).replaceAll('-', '.') : '-'}
					</td>
	            </tr>
	            `
	        );
	    });
	
	    if (!slice.hasNext) {
	        document
	            .getElementById("loadMoreBtn")
	            .style.display = "none";
	    }
	
	    page++;
	}


	document.getElementById("checkAll").addEventListener("change", function() {
	    document.querySelectorAll(".order-check").forEach(cb => {
	        cb.checked = this.checked;
	    });
	});
	
	async function updateSelectedStatus(status) {
	    const seqs = Array.from(
	        document.querySelectorAll(".order-check:checked")
	    ).map(cb => Number(cb.value));
	
	    if (seqs.length === 0) {
	        alert("선택된 항목이 없습니다.");
	        return;
	    }
	
	    try {
	        const response = await fetch("/api/purchase-orders/status", {
	            method: "POST",
	            headers: {
	                "Content-Type": "application/json"
	            },
	            body: JSON.stringify({
	                seqs: seqs,
	                status: status
	            })
	        });
	
	        if (!response.ok) {
	            throw new Error();
	        }
	        alert("상태가 변경되었습니다.");
	        location.reload();
	    } catch (e) {
	
	        alert("처리에 실패했습니다.");
	        console.error(e);	
	    }
	}
</script>
</body>
</html>
