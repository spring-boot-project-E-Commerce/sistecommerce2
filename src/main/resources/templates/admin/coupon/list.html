<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쿠폰 목록 - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin/style.css">
</head>
<body class="font-sans antialiased overflow-hidden">

  <div class="flex h-screen w-screen relative">
    
    <div th:replace="~{admin/sidebar :: sidebar}"></div>
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
      
      <div th:replace="~{admin/header :: header}"></div>

      <main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">

        <!-- 페이지 헤더 -->
        <div class="flex justify-between items-center mb-2">
          <div>
            <h2 class="text-title text-2xl font-bold">쿠폰 마스터 관리</h2>
            <p class="text-label text-sm mt-1">등록된 쿠폰 마스터를 조회하고 발급합니다.</p>
          </div>
          <a href="/admin/coupon/create"
             class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 px-4 rounded-lg transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            새 쿠폰 생성
          </a>
        </div>

        <!-- 요약 카드 -->
        <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
          <div class="card flex items-center justify-between">
            <div>
              <span  class="text-label text-sm font-medium">전체 등록 쿠폰</span>
              <h4 th:text="${coupons.size()}" class="text-value text-2xl font-bold mt-1"><span class="text-label text-sm font-normal ml-1">개</span></h4>
            </div>
            <div class="p-3 bg-indigo-500/20 text-indigo-400 rounded-lg">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
              </svg>
            </div>
          </div>
          <div class="card flex items-center justify-between">
            <div>
              <span class="text-label text-sm font-medium">배포 대기중</span>
              <h4   th:text="${coupons.?[status == 0].size()}" class="text-value text-2xl font-bold mt-1">5<span class="text-label text-sm font-normal ml-1">개</span></h4>
            </div>
            <div class="p-3 bg-yellow-500/20 text-yellow-400 rounded-lg">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
          </div>
          <div class="card flex items-center justify-between">
            <div>
              <span class="text-label text-sm font-medium">배포 완료</span>
              <h4 
                class="text-value text-2xl font-bold mt-1">
                <span th:text="${coupons.?[status == 1].size()}"></span>
                <span class="text-label text-sm font-normal ml-1">개</span>
              </h4>
            </div>
            <div class="p-3 bg-green-500/20 text-green-400 rounded-lg">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- 쿠폰 목록 테이블 -->
        <div class="card overflow-hidden">
          <div class="flex justify-between items-center mb-4 border-b border-gray-700/50 pb-4">
            <h4 class="text-title text-lg font-bold">쿠폰 목록</h4>
            <button onclick="location.reload()"
                    class="text-sm text-indigo-400 hover:text-indigo-300 font-medium">
              새로고침
            </button>
          </div>

          <!-- 필터 -->
          <div class="flex flex-wrap gap-2 mb-4">
            <button onclick="filterStatus('all')"
                    class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-indigo-600 text-white transition-colors"
                    data-status="all">전체</button>
            <button onclick="filterStatus('pending')"
                    class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-black/20 text-label hover:bg-black/30 transition-colors"
                    data-status="pending">배포 대기</button>
            <button onclick="filterStatus('issued')"
                    class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium bg-black/20 text-label hover:bg-black/30 transition-colors"
                    data-status="issued">배포 완료</button>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-sm text-left whitespace-nowrap">
              <thead class="text-xs text-label uppercase border-b border-gray-700/50">
                <tr>
                  <th class="px-6 py-3">No.</th>
                  <th class="px-6 py-3">쿠폰명</th>
                  <th class="px-6 py-3">할인 혜택</th>
                  <th class="px-6 py-3">예약일(유효기간)</th>
                  <th class="px-6 py-3">상태</th>
                  <th class="px-6 py-3">관리</th>
                </tr>
              </thead>
              <tbody id="couponTableBody">

                <!-- Thymeleaf: th:each="coupon : ${coupons}" -->
                <tr th:each="coupon, stat : ${coupons}" class="coupon-row border-b border-gray-700/50 hover:bg-black/10 transition-colors"
                    th:data-status="${coupon.status == 0 ? 'pending' : 'issued'}">
                  <td class="px-6 py-4 text-value font-medium" th:text="${coupon.seq}"></td>
                  <td class="px-6 py-4 text-value font-bold" th:text="${coupon.name}"></td>
                  <td class="px-6 py-4 text-indigo-400 font-medium">
                  <span th:if="${coupon.discountType == 1}" th:text="${#numbers.formatInteger(coupon.discountPrice, 0, 'COMMA')} + '원 할인'">정액할인</span>
                  <span th:if="${coupon.discountType == 0}" th:text="${coupon.discountRate} + '% 할인'">정률할인</span>
                  </td>
                  <td class="px-6 py-4 text-label" th:text="${coupon.startDate}"> 
                  <span class="opacity-70" th:text="${coupon.validDays}"></span>
                  </td>
                  <td class="px-6 py-4">
                    <span th:if="${coupon.status == 0}" class="px-2.5 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">배포 대기</span>
                    <span th:if="${coupon.status == 1}" class="px-2.5 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">배포 완료</span>
                  </td>
                  <td class="px-6 py-4">
                    <a th:href="@{/admin/coupons/{seq}/edit(seq=${coupon.seq})}" class="text-indigo-400 hover:underline mr-2">수정</a>
                    <button th:onclick="|deleteCoupon(${coupon.seq})|" class="text-red-400 hover:underline">삭제</button>
                  </td>
                </tr>
                
                <tr th:if="${#lists.isEmpty(coupons)}">
                        <td colspan="6" class="px-6 py-8 text-center text-gray-500 font-medium">
                            등록된 쿠폰이 없습니다. 새로운 쿠폰을 생성해 주세요!
                        </td>
                </tr>

              </tbody>
            </table>
          </div>
        </div>

        <!-- 쿠폰 발급 섹션 -->
        <div class="card">
          <h4 class="text-title text-lg font-bold mb-4 border-b border-gray-700/50 pb-2">쿠폰 발급 (Issue)</h4>
          <form action="/admin/api/coupons/issue"
              method="POST"
              onsubmit="return validateIssueForm(this)"
              class="space-y-4 max-w-xl">

            <div class="form-group">
              <label class="text-label block text-sm font-medium mb-1">발급할 쿠폰 선택 <span class="text-red-400">*</span></label>
              <select name="couponSeq" class="form-input w-full text-sm" required>
                <option value="">-- 배포 대기중인 쿠폰 선택 --</option>
                
                <option th:each="coupon : ${coupons.?[status == 0]}" 
                        th:value="${coupon.seq}" 
                        th:text="|[No.${coupon.seq}] ${coupon.name}|">
                </option>
                
              </select>
            </div>

            <div class="form-group">
              <label class="text-label block text-sm font-medium mb-2">발급 대상 지정</label>
              <div class="flex items-center mb-2">
                <input id="issue-all" type="radio" name="issueType" value="All"
                       class="h-4 w-4 text-indigo-600 border-gray-600 bg-transparent focus:ring-indigo-500"
                       checked>
                <label for="issue-all" class="text-value ml-2 text-sm">전체 회원 일괄 발급</label>
              </div>
              <div class="flex items-center">
                <input
                       id="issue-specific" type="radio"name="issueType" value="SPECIFIC"
                       class="h-4 w-4 text-indigo-600 border-gray-600 bg-transparent focus:ring-indigo-500"
                       >
                <label for="issue-specific" class="text-value ml-2 text-sm">특정 회원 발급</label>
              </div>
            </div>

            <div id="issueMemberSection" class="hidden form-group relative">
              <label class="text-label block text-xs font-medium mb-1">발급 대상 회원 검색</label>
              <div class="flex gap-2">
                <input id="issueSearchInput" type="text"
                       class="form-input w-full text-sm"
                       placeholder="이름 또는 아이디 검색"
                       onkeydown="if(event.key === 'Enter') { event.preventDefault(); searchIssueMember(); }">
                <button type="button" onclick="searchIssueMember()"
                        class="bg-indigo-600 text-white px-3 py-2 rounded-lg text-sm">검색</button>
              </div>
              <ul id="issueResultList"
                  class="hidden absolute z-10 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-lg max-h-40 overflow-y-auto"></ul>
              <div id="issueSelectedMembers" class="mt-3 flex flex-wrap gap-2"></div>
              <input type="hidden" id="issueTargetSeqs" name="memberSeqs">
            </div>

            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-colors text-sm">
              쿠폰 발급 실행
            </button>
          </form>
        </div>

      </main>
    </div>
  </div>

  
  <script src="/admin/admin.js"></script>
  <script>
    // ── 1. 리스트 필터 및 삭제 로직 (기존 유지) ──
    function filterStatus(status) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const isActive = btn.dataset.status === status;
        btn.classList.toggle('bg-indigo-600', isActive);
        btn.classList.toggle('text-white', isActive);
        btn.classList.toggle('bg-black/20', !isActive);
        btn.classList.toggle('text-label', !isActive);
      });

      document.querySelectorAll('.coupon-row').forEach(row => {
        if (status === 'all' || row.dataset.status === status) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      });
    }

    function deleteCoupon(id) {
      if (!confirm('쿠폰을 삭제하시겠습니까?')) return;
      fetch(`/admin/api/coupons/${id}`, { method: 'DELETE' })
        .then(res => res.ok ? location.reload() : alert('삭제에 실패했습니다.'))
        .catch(() => alert('오류가 발생했습니다.'));
    }

    // ── 2. 발급 대상 라디오 버튼 토글 로직 ──
    document.querySelectorAll('input[name="issueType"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const specificSection = document.getElementById('issueMemberSection');
        if (e.target.value === 'SPECIFIC') {
          specificSection.classList.remove('hidden');
        } else {
          specificSection.classList.add('hidden');
        }
      });
    });

    // ── 3. 회원 검색 API 연동 로직 ──
    let selectedIssueSeqs = [];

    function searchIssueMember() {
      const keyword = document.getElementById('issueSearchInput').value.trim();
      if (!keyword) {
        alert('검색어를 입력해주세요.');
        return;
      }

      // 우리가 만든 컨트롤러 API 호출!
      fetch(`/admin/coupons/search-members?keyword=${encodeURIComponent(keyword)}`)
        .then(response => {
            if (!response.ok) throw new Error('서버 에러 발생');
            return response.json();
        })
        .then(data => {
            renderIssueResults(data);
        })
        .catch(error => {
            console.error('검색 오류:', error);
            alert('회원 검색에 실패했습니다.');
        });
    }

    function renderIssueResults(results) {
      const resultList = document.getElementById('issueResultList');
      resultList.innerHTML = '';

      if (results.length === 0) {
        resultList.innerHTML = '<li class="p-3 text-sm text-gray-500 text-center">검색 결과가 없습니다.</li>';
      } else {
        results.forEach(user => {
          const li = document.createElement('li');
          li.className = 'p-2 hover:bg-gray-100 cursor-pointer text-sm text-gray-800 border-b last:border-0';
          // DTO 필드명에 맞게 user.name, user.username 세팅
          li.textContent = `${user.name} (${user.username})`;
          li.onclick = () => addIssueMember(user.seq, user.name, user.username);
          resultList.appendChild(li);
        });
      }
      resultList.classList.remove('hidden');
    }

    function addIssueMember(seq, name, id) {
      if (selectedIssueSeqs.includes(seq)) {
        alert('이미 추가된 회원입니다.');
        document.getElementById('issueResultList').classList.add('hidden');
        return;
      }

      selectedIssueSeqs.push(seq);
      updateIssueHiddenInput();

      const container = document.getElementById('issueSelectedMembers');
      const badge = document.createElement('span');
      badge.className = 'inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 text-xs font-medium mb-1';
      badge.innerHTML = `
        ${name}(${id})
        <button type="button" onclick="removeIssueMember(${seq}, this)" class="hover:text-red-400 focus:outline-none ml-1">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      `;
      container.appendChild(badge);

      document.getElementById('issueSearchInput').value = '';
      document.getElementById('issueResultList').classList.add('hidden');
    }

    function removeIssueMember(seq, btnElement) {
      selectedIssueSeqs = selectedIssueSeqs.filter(id => id !== seq);
      updateIssueHiddenInput();
      btnElement.parentElement.remove();
    }

    function updateIssueHiddenInput() {
      document.getElementById('issueTargetSeqs').value = selectedIssueSeqs.join(',');
    }

    // 화면 밖 클릭 시 검색 결과 숨김
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#issueMemberSection')) {
        document.getElementById('issueResultList')?.classList.add('hidden');
      }
    });

    // ── 4. 폼 제출 검증 ──
    function validateIssueForm(form) {
      const issueType = form.querySelector('input[name="issueType"]:checked').value;
      if (issueType === 'SPECIFIC' && selectedIssueSeqs.length === 0) {
        alert('특정 회원 발급 시 최소 1명 이상의 회원을 검색하여 선택해주세요.');
        return false; // 폼 제출 막기
      }
      return true; // 폼 제출 허용
    }
  </script>
</body>
</html>
