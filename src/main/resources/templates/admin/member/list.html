<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원 목록 - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin/style.css">
  <style>
    /* Tailwind 임의 값 렌더링 지연 방지용 테마 연동 클래스 */
    .theme-bg-body { background-color: var(--bg-body); }
    .theme-bg-panel { background-color: var(--bg-panel); }
    .theme-text-main { color: var(--text-main); }
    .theme-text-muted { color: var(--text-muted); }
    .theme-text-white { color: var(--text-white); }
    .theme-border { border-color: var(--border-color); }
  </style>
</head>
<body class="font-sans antialiased overflow-hidden theme-bg-body theme-text-main">
  <div class="flex h-screen w-screen relative">

    <div th:replace="~{admin/sidebar :: sidebar}"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
      <div th:replace="~{admin/header :: header}"></div>

      <main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
        <div class="flex justify-between items-center mb-2">
          <div>
            <h2 class="text-title text-2xl font-bold tracking-tight">회원 관리</h2>
            <p class="text-label text-sm mt-1">가입된 회원 목록을 조회하고 검색합니다.</p>
          </div>

          <form action="/admin/member/list" method="get" class="flex gap-2">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="이름, 아이디, 이메일 검색"
                   class="form-input text-sm w-64 outline-none focus:border-[var(--primary)]">
            <button type="submit" class="btn btn-primary text-sm px-4 py-2 font-medium transition-colors">검색</button>
            <a th:if="${keyword != null and keyword != ''}" href="/admin/member/list"
               class="btn text-sm px-4 py-2 theme-bg-body theme-border border hover:opacity-80 rounded theme-text-main font-medium transition-colors">초기화</a>
          </form>
        </div>

        <div class="card overflow-hidden p-0">
          <div class="overflow-x-auto">
            <table class="w-full text-sm text-left whitespace-nowrap theme-text-main">
              <thead class="text-xs uppercase border-b theme-border theme-bg-body theme-text-muted">
                <tr>
                  <th class="px-6 py-4 font-medium">No.</th>
                  <th class="px-6 py-4 font-medium">이름(아이디)</th>
                  <th class="px-6 py-4 font-medium">닉네임</th>
                  <th class="px-6 py-4 font-medium">이메일</th>
                  <th class="px-6 py-4 font-medium">회원상태</th>
                  <th class="px-6 py-4 font-medium">가입일</th>
                  <th class="px-6 py-4 font-medium">최근로그인</th>
                </tr>
              </thead>
              <tbody class="divide-y theme-border">
                <tr th:each="member : ${members.content}" class="hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                  <td class="px-6 py-4 font-medium" th:text="${member.seq}"></td>
                  <td class="px-6 py-4">
                    <a th:href="@{/admin/member/{seq}(seq=${member.seq})}" class="group block">
                      <div class="font-bold theme-text-white group-hover:text-[var(--primary)] transition-colors underline-offset-2 group-hover:underline" th:text="${member.name}"></div>
                      <div class="text-xs theme-text-muted group-hover:text-[var(--primary)] transition-colors" th:text="${member.username}"></div>
                    </a>
                  </td>
                  <td class="px-6 py-4" th:text="${member.nickname}"></td>
                  <td class="px-6 py-4" th:text="${member.email}"></td>
                  <td class="px-6 py-4">
                    <span th:if="${member.status == 1}" class="badge badge-success">정상</span>
                    <span th:if="${member.status == 2}" class="badge" style="background:rgba(245,158,11,0.1); color:#f59e0b;">휴면</span>
                    <span th:if="${member.status == 3}" class="badge badge-danger">정지</span>
                    <span th:if="${member.status == 4}" class="badge" style="background:rgba(156,163,175,0.1); color:#9ca3af;">탈퇴대기</span>
                    <span th:if="${member.status == 5}" class="badge badge-danger">탈퇴완료</span>
                  </td>
                  <td class="px-6 py-4 text-xs theme-text-muted" th:text="${member.joinedAt != null ? #temporals.format(member.joinedAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                  <td class="px-6 py-4 text-xs theme-text-muted" th:text="${member.lastLoginAt != null ? #temporals.format(member.lastLoginAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(members.content)}">
                  <td colspan="7" class="px-6 py-10 text-center theme-text-muted">
                    검색된 회원이 없습니다.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="px-6 py-4 border-t theme-border flex items-center justify-between" th:if="${members.totalPages > 0}">
            <div class="text-sm theme-text-muted">
              총 <span class="font-bold theme-text-white" th:text="${members.totalElements}"></span>명
            </div>
            <div class="flex space-x-1">
              <a th:if="${members.hasPrevious()}"
                 th:href="@{/admin/member/list(page=${members.number - 1}, size=${members.size}, keyword=${keyword})}"
                 class="px-3 py-1 theme-bg-body border theme-border rounded theme-text-main hover:opacity-80 text-sm">이전</a>

              <th:block th:each="pageNum : ${#numbers.sequence(0, members.totalPages - 1)}">
                <a th:if="${pageNum >= members.number - 2 and pageNum <= members.number + 2}"
                   th:href="@{/admin/member/list(page=${pageNum}, size=${members.size}, keyword=${keyword})}"
                   th:text="${pageNum + 1}"
                   th:class="${pageNum == members.number} ? 'px-3 py-1 bg-[var(--primary)] rounded text-white text-sm font-bold' : 'px-3 py-1 theme-bg-body border theme-border rounded theme-text-main hover:opacity-80 text-sm'">
                </a>
              </th:block>

              <a th:if="${members.hasNext()}"
                 th:href="@{/admin/member/list(page=${members.number + 1}, size=${members.size}, keyword=${keyword})}"
                 class="px-3 py-1 theme-bg-body border theme-border rounded theme-text-main hover:opacity-80 text-sm">다음</a>
            </div>
          </div>
        </div>

        
      </main>
      
      <script src="/admin/admin.js"></script>
      
    </div>
  </div>
</body>
</html>
