<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('마이페이지 | 회원탈퇴')}"></head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col" style="background-color:#f8fafc;">

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="max-w-screen-wide mx-auto w-full px-4 py-10 flex-1">
        <div class="grid grid-cols-1 md:grid-cols-[260px_1fr] gap-6">

            <div th:replace="~{fragments/mypage-aside :: aside('withdrawal')}"></div>

            <section class="bg-white border border-gray-100 rounded-2xl shadow-sm p-8">

                <h1 class="text-xl font-black text-gray-900 mb-1">회원탈퇴</h1>
                <p class="text-xs text-gray-400 mb-6">탈퇴 신청 후 3일 이내에는 복구할 수 있습니다.</p>

                <!-- flash 메시지 -->
                <div th:if="${successMsg}" class="mb-6 bg-green-50 border border-green-200 px-4 py-3 rounded-xl">
                    <p th:text="${successMsg}" class="text-xs text-green-700 font-semibold"></p>
                </div>
                <div th:if="${errorMsg}" class="mb-6 bg-red-50 border border-red-200 px-4 py-3 rounded-xl">
                    <p th:text="${errorMsg}" class="text-xs text-red-600 font-semibold"></p>
                </div>

                <!-- 탈퇴보류중: 복구 안내 -->
                <div th:if="${view.pending}">
                    <div class="bg-amber-50 border border-amber-200 px-5 py-4 rounded-xl mb-6">
                        <p class="text-sm font-bold text-amber-800 mb-1">탈퇴 신청이 접수된 상태입니다.</p>
                        <p class="text-xs text-amber-700">
                            <span th:if="${view.scheduledDeleteAt}">
                                <span th:text="${view.scheduledDeleteAt}">2026-06-14</span>까지 복구하지 않으면 탈퇴가 확정되며,
                                개인정보는 마스킹 처리됩니다.
                            </span>
                            <span th:unless="${view.scheduledDeleteAt}">유예기간 내 복구하지 않으면 탈퇴가 확정됩니다.</span>
                        </p>
                    </div>
                    <form th:action="@{/mypage/withdrawal/restore}" method="post">
                        <button type="submit"
                            class="w-full md:w-auto bg-slate-900 hover:bg-amber-500 text-white hover:text-slate-900 font-bold text-sm px-6 py-3 rounded-xl transition-colors">
                            탈퇴 신청 취소(복구)
                        </button>
                    </form>
                </div>

                <!-- 활성: 탈퇴 신청 폼 -->
                <div th:if="${view.active}">
                    <div class="bg-gray-50 border border-gray-200 px-5 py-4 rounded-xl mb-6 text-xs text-gray-600 leading-relaxed">
                        <p class="font-bold text-gray-700 mb-1">탈퇴 시 유의사항</p>
                        <ul class="list-disc pl-4 space-y-1">
                            <li>탈퇴 후 3일 이내에는 로그인하여 복구할 수 있습니다.</li>
                            <li>3일 경과 시 탈퇴가 확정되며 개인정보는 마스킹 처리됩니다.</li>
                            <li>전자상거래법에 따라 거래 기록은 일정 기간 보존됩니다.</li>
                        </ul>
                    </div>

                    <form th:action="@{/mypage/withdrawal}" method="post"
                          onsubmit="return confirm('정말 탈퇴를 신청하시겠습니까?');">
                        <label class="block text-xs font-bold text-gray-700 mb-2">탈퇴 사유</label>
                        <select name="reasonSeq" required
                            class="w-full border border-gray-300 px-4 py-2.5 text-sm rounded-xl focus:outline-none focus:border-amber-500 mb-6">
                            <option value="" disabled selected>사유를 선택해 주세요</option>
                            <option th:each="r : ${view.reasons}" th:value="${r.seq}" th:text="${r.reason}"></option>
                        </select>

                        <button type="submit"
                            class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white font-bold text-sm px-6 py-3 rounded-xl transition-colors">
                            회원 탈퇴 신청
                        </button>
                    </form>
                </div>

                <!-- 그 외 상태(휴면/정지/탈퇴완료 등) -->
                <div th:if="${!view.pending and !view.active}">
                    <div class="bg-gray-50 border border-gray-200 px-5 py-4 rounded-xl text-sm text-gray-600">
                        현재 상태에서는 탈퇴를 진행할 수 없습니다.
                    </div>
                </div>

            </section>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
