<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('마이페이지 | 배송지 관리')}"></head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f8fafc; }
        .premium-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226,232,240,0.8);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.6); backdrop-filter: blur(4px);
            z-index: 50; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content {
            background: white; padding: 2rem; border-radius: 24px;
            width: 90%; max-width: 480px;
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
    </style>

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-7xl mx-auto px-4 mt-10 mb-32 flex-1 w-full">
    <div class="grid grid-cols-1 lg:grid-cols-[240px_1fr] gap-8">

        <div th:replace="~{fragments/mypage-aside :: aside('address')}"></div>

        <section class="space-y-6">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-900">배송지 관리</h1>
                    <p class="text-slate-500 mt-2 text-sm">최대 10개까지 등록할 수 있어요.</p>
                </div>
                <button type="button" onclick="openAddModal()"
                        class="bg-amber-500 hover:bg-amber-600 text-white font-bold px-5 py-2.5 rounded-xl text-sm transition-colors shadow-sm shadow-amber-200">
                    + 새 배송지 추가
                </button>
            </div>

            <!-- 배송지 목록 -->
            <div class="space-y-4" th:if="${memberAddressList != null and !memberAddressList.isEmpty()}">
                <div th:each="addr : ${memberAddressList}" class="premium-card p-6 flex flex-col md:flex-row md:items-center gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span th:text="${addr.addressAlias}" class="font-bold text-slate-900">집</span>
                            <span th:if="${#strings.toUpperCase(addr.defaultYn) == 'Y'}"
                                  class="text-xs font-bold px-2.5 py-1 bg-amber-100 text-amber-600 rounded-full">기본 배송지</span>
                        </div>
                        <p th:text="${addr.recipientName} + ' · ' + ${addr.recipientPhone}"
                           class="text-sm text-slate-600 mt-1">홍길동 · 010-0000-0000</p>
                        <p th:text="'(' + ${addr.zipcode} + ') ' + ${addr.address} + ' ' + ${addr.addressDetail}"
                           class="text-sm text-slate-700 mt-1">주소</p>
                        <p th:if="${addr.note != null and !addr.note.isEmpty()}"
                           th:text="'배송 메모: ' + ${addr.note}"
                           class="text-xs text-slate-400 mt-1">배송 메모</p>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button th:if="${#strings.toUpperCase(addr.defaultYn) != 'Y'}"
                                th:attr="onclick=|setDefault(${addr.seq})|"
                                class="px-4 py-2 text-sm font-semibold border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 transition-colors">
                            기본 배송지로
                        </button>
                        <button th:attr="onclick=|openEditModal(${addr.seq})|"
                                class="px-4 py-2 text-sm font-semibold border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 transition-colors">
                            수정
                        </button>
                        <button th:attr="onclick=|deleteAddress(${addr.seq})|"
                                class="px-4 py-2 text-sm font-semibold border border-red-200 text-red-500 rounded-xl hover:bg-red-50 transition-colors">
                            삭제
                        </button>
                    </div>
                </div>
            </div>

            <!-- 목록 없을 때 -->
            <div th:if="${memberAddressList == null or memberAddressList.isEmpty()}" class="premium-card p-12 text-center">
                <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-700">등록된 배송지가 없습니다.</h3>
                <p class="text-slate-500 mt-2 text-sm">자주 사용하는 배송지를 등록해두면 편리해요.</p>
                <button onclick="openAddModal()"
                        class="inline-block mt-6 px-6 py-2.5 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition-colors">
                    배송지 추가하기
                </button>
            </div>
        </section>
    </div>
</main>

<!-- 배송지 추가/수정 모달 -->
<div id="addressModal" class="modal-overlay">
    <div class="modal-content">
        <h3 class="text-xl font-bold text-slate-900 mb-6" id="modalTitle">배송지 추가</h3>
        <form id="addressForm" class="space-y-4">
            <input type="hidden" id="addrSeq">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">별칭 (집, 회사 등)</label>
                <input type="text" id="addressAlias" placeholder="예: 집"
                       class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">받는 분 <span class="text-red-500">*</span></label>
                    <input type="text" id="recipientName" placeholder="이름"
                           class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">연락처 <span class="text-red-500">*</span></label>
                    <input type="text" id="recipientPhone" placeholder="010-0000-0000"
                           class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">주소 <span class="text-red-500">*</span></label>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="zipcode" placeholder="우편번호" readonly
                           class="w-32 border border-slate-200 rounded-xl px-4 py-2.5 text-sm bg-slate-50">
                    <button type="button" onclick="openPostcode()"
                            class="px-4 py-2.5 bg-slate-800 text-white text-sm font-bold rounded-xl hover:bg-slate-700 transition-colors">
                        주소 검색
                    </button>
                </div>
                <input type="text" id="baseAddress" placeholder="기본 주소" readonly
                       class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm bg-slate-50 mb-2">
                <input type="text" id="addressDetail" placeholder="상세 주소"
                       class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">배송 메모</label>
                <input type="text" id="note" placeholder="예: 경비실에 맡겨주세요"
                       class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">공동현관 출입번호</label>
                <input type="text" id="entryCode" placeholder="예: #1234"
                       class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="defaultYn" class="w-4 h-4 accent-amber-500">
                <span class="text-sm font-medium text-slate-700">기본 배송지로 설정</span>
            </label>
            <div class="flex gap-3 pt-2">
                <button type="button" onclick="closeModal()"
                        class="flex-1 py-3 border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-colors">
                    취소
                </button>
                <button type="button" onclick="saveAddress()"
                        class="flex-1 py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl transition-colors">
                    저장
                </button>
            </div>
        </form>
    </div>
</div>

<!-- 카카오 우편번호 API -->
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>
    function openAddModal() {
        document.getElementById('modalTitle').innerText = '배송지 추가';
        document.getElementById('addressForm').reset();
        document.getElementById('addrSeq').value = '';
        document.getElementById('addressModal').classList.add('active');
    }

    function openEditModal(seq) {
        document.getElementById('modalTitle').innerText = '배송지 수정';
        fetch('/api/mypage/address/' + seq)
            .then(r => r.json())
            .then(d => {
                document.getElementById('addrSeq').value = d.seq;
                document.getElementById('addressAlias').value = d.addressAlias || '';
                document.getElementById('recipientName').value = d.recipientName;
                document.getElementById('recipientPhone').value = d.recipientPhone;
                document.getElementById('zipcode').value = d.zipcode;
                document.getElementById('baseAddress').value = d.address;
                document.getElementById('addressDetail').value = d.addressDetail || '';
                document.getElementById('note').value = d.note || '';
                document.getElementById('entryCode').value = d.entryCode || '';
                document.getElementById('defaultYn').checked = d.defaultYn === 'Y';
                document.getElementById('addressModal').classList.add('active');
            });
    }

    function closeModal() {
        document.getElementById('addressModal').classList.remove('active');
    }

    function openPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                document.getElementById('zipcode').value = data.zonecode;
                document.getElementById('baseAddress').value = data.roadAddress || data.jibunAddress;
                document.getElementById('addressDetail').focus();
            }
        }).open();
    }

    function saveAddress() {
        const seq = document.getElementById('addrSeq').value;
        const body = {
            addressAlias:   document.getElementById('addressAlias').value,
            recipientName:  document.getElementById('recipientName').value,
            recipientPhone: document.getElementById('recipientPhone').value,
            zipcode:        document.getElementById('zipcode').value,
            address:        document.getElementById('baseAddress').value,
            addressDetail:  document.getElementById('addressDetail').value,
            note:           document.getElementById('note').value,
            entryCode:      document.getElementById('entryCode').value,
            defaultYn:      document.getElementById('defaultYn').checked ? 'Y' : 'N'
        };

        if (!body.recipientName || !body.recipientPhone || !body.address) {
            alert('필수 항목을 입력해주세요.');
            return;
        }

        const url    = seq ? '/api/mypage/address/' + seq : '/api/mypage/address';
        const method = seq ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
        .then(r => {
            if (!r.ok) return r.json().then(e => { throw new Error(e.message); });
            closeModal();
            location.reload();
        })
        .catch(e => alert(e.message || '오류가 발생했습니다.'));
    }

    function setDefault(seq) {
        fetch('/api/mypage/address/' + seq + '/default', { method: 'PATCH' })
            .then(r => { if (r.ok) location.reload(); });
    }

    function deleteAddress(seq) {
        if (!confirm('배송지를 삭제하시겠습니까?')) return;
        fetch('/api/mypage/address/' + seq, { method: 'DELETE' })
            .then(r => { if (r.ok) location.reload(); });
    }

    document.getElementById('addressModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
</script>
</body>
</html>
