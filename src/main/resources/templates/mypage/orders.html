<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('마이페이지 | 주문목록')}"></head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">
    <!-- 프리미엄 디자인을 위한 폰트 및 애니메이션 스타일 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f8fafc; }
        
        .premium-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }
        .premium-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }

        .btn-action {
            transition: all 0.2s;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-action:hover { transform: translateY(-1px); }
        .btn-action:active { transform: translateY(0); }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .status-READY { background-color: #f1f5f9; color: #475569; }
        .status-SHIPPING { background-color: #dbeafe; color: #2563eb; }
        .status-DELIVERED { background-color: #dcfce3; color: #16a34a; }
        .status-DELAYED { background-color: #fef3c7; color: #d97706; }
        .status-FAILED { background-color: #fee2e2; color: #dc2626; }
        
        /* 모달 (팝업) 스타일 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            z-index: 50; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content {
            background: white; padding: 2rem; border-radius: 24px;
            width: 90%; max-width: 400px; text-align: center;
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
    </style>

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-7xl mx-auto px-4 mt-10 mb-32 flex-1 w-full">
    
    <div class="grid grid-cols-1 lg:grid-cols-[240px_1fr] gap-8">

        <!-- 공통 사이드바 연동 -->
        <div th:replace="~{fragments/mypage-aside :: aside('orders')}"></div>

        <!-- 우측 메인 컨텐츠 -->
        <section class="space-y-6">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-900">주문목록 / 배송조회</h1>
                    <p class="text-slate-500 mt-2 text-sm">고객님의 소중한 주문 내역과 실시간 배송 상태를 확인하세요.</p>
                </div>
            </div>

            <!-- 검색 필터 영역 -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <form th:action="@{/mypage/orders}" method="get" class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="주문하신 상품명을 검색해보세요"
                               class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all">
                    </div>
                    <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-xl text-sm font-bold transition-colors shadow-sm shadow-amber-200">검색</button>
                </form>
                
                <div class="flex flex-wrap gap-2 text-xs font-semibold mt-4">
                    <button type="button" class="px-4 py-2 bg-slate-800 text-white rounded-lg">✓ 최근 6개월</button>
                    <button type="button" class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">2026</button>
                    <button type="button" class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">2025</button>
                    <button type="button" class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">2024</button>
                </div>
            </div>

            <!-- 주문 목록 -->
            <div class="space-y-5" th:if="${orders != null and !orders.isEmpty()}">
                <article th:each="o : ${orders}" class="premium-card overflow-hidden">
                    <!-- 헤더 영역 -->
                    <div class="px-6 py-4 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
                        <div class="text-sm">
                            <span class="text-slate-500 font-medium mr-2">주문일자</span>
                            <span class="font-bold text-slate-800" th:text="${o.orderDate}">2026.06.07 15:30</span>
                        </div>
                        <a href="#" class="text-xs font-bold text-amber-600 hover:text-amber-700">주문 상세보기 &rarr;</a>
                    </div>
                    
                    <!-- 컨텐츠 영역 -->
                    <div class="p-6 flex flex-col md:flex-row items-center gap-6">
                        <div class="flex-1 flex gap-5 w-full">
                            <!-- 상품 썸네일 -->
                            <div class="w-24 h-24 rounded-xl overflow-hidden shadow-sm shrink-0 border border-slate-100">
                                <img th:src="${o.image}" alt="상품 이미지" class="w-full h-full object-cover">
                            </div>
                            
                            <!-- 상품 정보 -->
                            <div class="flex flex-col justify-center">
                                <div class="mb-2">
                                    <span th:class="'status-badge status-' + ${o.deliveryStatus}" th:text="${o.deliveryStatus}">배송중</span>
                                </div>
                                <h4 th:text="${o.name}" class="font-bold text-lg text-slate-900 leading-tight">프리미엄 상품명</h4>
                                <div class="mt-2 text-sm text-slate-500 font-medium">
                                    <span th:text="${#numbers.formatInteger(o.price, 0, 'COMMA')} + '원'" class="text-slate-700 font-bold">15,000원</span>
                                    <span class="mx-1">·</span>
                                    <span th:text="${o.qty} + '개'">1개</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 액션 버튼 -->
                        <div class="flex md:flex-col w-full md:w-32 gap-2 shrink-0">
                            <!-- 배송조회 (운송장번호를 모달로 띄움) -->
                            <button type="button" 
                                    th:attr="onclick=|showDeliveryTrack('${o.trackingNumber}', '${o.deliveryStatus}')|"
                                    class="btn-action flex-1 py-2.5 border border-slate-200 text-slate-700 bg-white hover:border-amber-500 hover:text-amber-600 text-sm">
                                배송조회
                            </button>
                            <button type="button" 
                                    onclick="requestReturn()"
                                    class="btn-action flex-1 py-2.5 border border-slate-200 text-slate-700 bg-white hover:bg-slate-50 text-sm">
                                반품신청
                            </button>
                            <button type="button" 
                                    onclick="cancelOrder()"
                                    class="btn-action flex-1 py-2.5 border border-red-200 text-red-600 bg-red-50 hover:bg-red-100 text-sm">
                                주문취소
                            </button>
                        </div>
                    </div>
                </article>
            </div>
            
            <!-- 목록이 없을 때 -->
            <div th:if="${orders == null or orders.isEmpty()}" class="premium-card p-12 text-center">
                <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                </div>
                <h3 class="text-lg font-bold text-slate-700">주문 내역이 없습니다.</h3>
                <p class="text-slate-500 mt-2 text-sm">새로운 상품을 둘러보고 마음에 드는 상품을 주문해보세요.</p>
                <a th:href="@{/}" class="inline-block mt-6 px-6 py-2.5 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition-colors">쇼핑하러 가기</a>
            </div>

            <!-- 페이징 (퍼블리싱용 유지) -->
            <nav th:if="${orders != null and !orders.isEmpty()}" class="flex items-center justify-center gap-2 mt-12 mb-8">
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400 hover:bg-slate-50 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-xl bg-amber-500 text-white font-bold shadow-sm shadow-amber-200">1</a>
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium transition-colors">2</a>
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium transition-colors">3</a>
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400 hover:bg-slate-50 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
            </nav>
        </section>
    </div>
</main>

<!-- 배송조회 모달창 -->
<div id="trackModal" class="modal-overlay">
    <div class="modal-content">
        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">운송장 번호 조회</h3>
        <p class="text-slate-500 text-sm mb-6">현재 배송 상태: <span id="modalStatusText" class="font-bold text-blue-600"></span></p>
        
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6">
            <p class="text-xs font-bold text-slate-400 mb-1">운송장 번호</p>
            <p id="modalTrackingNumber" class="text-lg font-black tracking-widest text-slate-800">123-456-789</p>
        </div>
        
        <button onclick="closeModal()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition-colors">확인</button>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>
    // 배송조회 버튼 클릭 시 모달 열기
    function showDeliveryTrack(trackingNumber, status) {
        document.getElementById('modalTrackingNumber').innerText = trackingNumber;
        document.getElementById('modalStatusText').innerText = status;
        document.getElementById('trackModal').classList.add('active');
    }

    // 모달 닫기
    function closeModal() {
        document.getElementById('trackModal').classList.remove('active');
    }

    // 반품 신청 알림
    function requestReturn() {
        const confirmed = confirm("반품을 신청하시겠습니까?\n고객센터(1588-0000)를 통해 접수됩니다.");
        if (confirmed) {
            alert("반품 신청이 완료되었습니다. 담당자가 곧 연락드리겠습니다.");
        }
    }

    // 주문 취소 알림
    function cancelOrder() {
        const confirmed = confirm("정말로 이 주문을 취소하시겠습니까?");
        if (confirmed) {
            alert("주문이 취소되었습니다. 결제 금액은 3~5 영업일 내 환불됩니다.");
        }
    }

    // 모달 바깥 영역 클릭 시 닫기
    document.getElementById('trackModal').addEventListener('click', function(e) {
        if(e.target === this) closeModal();
    });
</script>

</body>
</html>
