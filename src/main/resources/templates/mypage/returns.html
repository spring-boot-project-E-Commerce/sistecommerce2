<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('마이페이지 | 취소/반품/교환/환불내역')}"></head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f8fafc; }

    .premium-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-radius: 20px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        transition: all 0.3s ease;
    }
    .premium-card:hover {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
        transform: translateY(-2px);
    }

    .btn-detail {
        transition: all 0.2s;
        border-radius: 10px;
        font-weight: 600;
    }
    .btn-detail:hover { transform: translateY(-1px); }
    .btn-detail:active { transform: translateY(0); }

    .status-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }
    .status-CANCEL { background-color: #fee2e2; color: #dc2626; }
    .status-RETURN { background-color: #fef3c7; color: #d97706; }
    .status-RETURNED { background-color: #f1f5f9; color: #475569; }

    /* Modal Styling */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
        z-index: 50; display: flex; justify-content: center; align-items: center;
        opacity: 0; visibility: hidden; pointer-events: none;
        transition: opacity 0.15s ease, visibility 0.15s ease;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; pointer-events: auto; }
    .modal-content {
        background: white; padding: 2rem; border-radius: 24px;
        width: 95%; max-width: 500px;
        transform: scale(0.95); transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .modal-overlay.active .modal-content { transform: scale(1); }
</style>

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-7xl mx-auto px-4 mt-10 mb-32 flex-1 w-full">
    <div class="grid grid-cols-1 lg:grid-cols-[240px_1fr] gap-8">
        <div th:replace="~{fragments/mypage-aside :: aside('returns')}"></div>

        <!-- React Mount Target -->
        <div id="returns-root" class="space-y-6"></div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script type="module" src="/js/mypage-returns.js"></script>
</body>
</html>
