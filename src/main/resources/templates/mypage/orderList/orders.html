<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('마이페이지 | 주문목록')}"></head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f8fafc; }

    .premium-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-radius: 20px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        transition: all 0.3s ease;
    }
    .premium-card:hover {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
        transform: translateY(-2px);
    }

    .delivery-company-group {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        box-shadow: inset 4px 0 0 #f59e0b, 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .btn-action {
        transition: all 0.2s;
        border-radius: 10px;
        font-weight: 600;
    }
    .btn-action:hover { transform: translateY(-1px); }
    .btn-action:active { transform: translateY(0); }

    .status-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .status-DELIVERED { background-color: #dcfce7; color: #16a34a; }

    .modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
        z-index: 50; justify-content: center; align-items: center;
        opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-content {
        background: white; padding: 2rem; border-radius: 24px;
        width: 90%; max-width: 400px; text-align: center;
        transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .modal-overlay.active .modal-content { transform: scale(1); }
</style>

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-7xl mx-auto px-4 mt-10 mb-32 flex-1 w-full">
    <div class="grid grid-cols-1 lg:grid-cols-[240px_1fr] gap-8">
        <div th:replace="~{fragments/mypage-aside :: aside('orders')}"></div>

        <section class="space-y-6">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-900">주문목록 / 배송조회</h1>
                    <p class="text-slate-500 mt-2 text-sm">하나의 주문 안에서 택배사별 상품 묶음을 확인할 수 있습니다.</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <form th:action="@{/mypage/orders}" method="get" class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="주문하신 상품명을 검색해보세요"
                               class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all">
                    </div>
                    <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-xl text-sm font-bold transition-colors shadow-sm shadow-amber-200">검색</button>
                </form>

                <div class="flex flex-wrap gap-2 text-xs font-semibold mt-4">
                    <button type="button" class="px-4 py-2 bg-slate-800 text-white rounded-lg">최근 6개월</button>
                    <button type="button" class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">2026</button>
                    <button type="button" class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">2025</button>
                    <button type="button" class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">2024</button>
                </div>
            </div>

            <div class="space-y-5" th:if="${orders != null and !orders.isEmpty()}">
                <article th:each="o : ${orders}" class="premium-card overflow-hidden">
                    <div class="px-6 py-4 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
                        <div class="text-sm flex items-center gap-3">
                            <span class="text-slate-500 font-medium">주문일자</span>
                            <span class="font-bold text-slate-800" th:text="${o.orderDate}">2026.06.07 15:30</span>
                        </div>
                        <a href="#" class="text-xs font-bold text-amber-600 hover:text-amber-700">주문 상세보기</a>
                    </div>

                    <div class="bg-slate-50/60 px-3 py-4 sm:px-6 sm:py-5 space-y-4">
                        <div th:each="d : ${o.deliveries}"
                             class="delivery-company-group p-5 sm:p-6"
                             th:data-order-seq="${o.orderSeq}"
                             th:data-company-name="${d.companyName}">
                            <div class="mb-5 flex flex-col gap-2 border-b border-slate-100 pb-4 sm:flex-row sm:items-center sm:justify-between">
                                <div class="flex flex-wrap items-center gap-2" th:if="${d.deliveryStatus == 'DELIVERED'}">
                                    <span class="status-badge status-DELIVERED">배송완료</span>
                                    <span class="text-xs font-semibold text-slate-500" th:if="${d.completedAt != null and !d.completedAt.isEmpty()}"
                                          th:text="${'도착일 ' + d.completedAt}">도착일 2026.06.08 12:00</span>
                                </div>
                            </div>

                            <div class="flex flex-col lg:flex-row gap-8">
                                <div class="flex-1 space-y-4">
                                    <div th:each="item : ${d.items}" class="flex gap-5 items-center pb-4 last:pb-0 last:border-b-0 border-b border-slate-100">
                                        <a th:href="@{/products/{seq}(seq=${item.productSeq})}" class="shrink-0">
                                            <div class="w-20 h-20 rounded-xl overflow-hidden shadow-sm border border-slate-100 hover:opacity-90 transition-opacity">
                                                <img th:src="${item.image}" alt="상품 이미지" class="w-full h-full object-cover">
                                            </div>
                                        </a>

                                        <div class="flex flex-col justify-center">
                                            <a th:href="@{/products/{seq}(seq=${item.productSeq})}">
                                                <h4 th:text="${item.name}" class="font-bold text-base text-slate-900 leading-tight hover:text-amber-600 transition-colors">상품명</h4>
                                            </a>
                                            <div class="mt-1.5 text-sm text-slate-500 font-medium">
                                                <span th:text="${item.price != null ? #numbers.formatInteger(item.price, 0, 'COMMA') + '원' : '0원'}" class="text-slate-700 font-bold">15,000원</span>
                                                <span class="mx-1">x</span>
                                                <span th:text="${item.qty} + '개'">1개</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="w-full lg:w-72 shrink-0 flex flex-col justify-center pl-0 lg:pl-6 border-t lg:border-t-0 lg:border-l border-slate-100 pt-5 lg:pt-0">
                                    <div class="flex flex-col gap-2 w-full">
                                        <button type="button"
                                                th:data-tracking="${d.trackingNumber}"
                                                th:data-status="${d.deliveryStatus}"
                                                th:data-order-seq="${o.orderSeq}"
                                                th:data-company="${d.companyName}"
                                                onclick="showDeliveryTrack(this.getAttribute('data-tracking'), this.getAttribute('data-status'))"
                                                class="btn-action py-2.5 border border-slate-200 text-slate-700 bg-white hover:border-amber-500 hover:text-amber-600 text-sm shadow-sm">
                                            배송조회
                                        </button>
                                        <button type="button"
                                                th:data-order-seq="${o.orderSeq}"
                                                th:data-company="${d.companyName}"
                                                onclick="requestReturn(this.getAttribute('data-order-seq'), this.getAttribute('data-company'))"
                                                class="btn-action py-2.5 border border-slate-200 text-slate-700 bg-white hover:bg-slate-50 text-sm shadow-sm">
                                            반품신청
                                        </button>
                                        <button type="button"
                                                th:data-order-seq="${o.orderSeq}"
                                                th:data-company="${d.companyName}"
                                                onclick="cancelOrder(this.getAttribute('data-order-seq'), this.getAttribute('data-company'))"
                                                class="btn-action py-2.5 border border-red-200 text-red-600 bg-red-50 hover:bg-red-100 text-sm shadow-sm">
                                            주문취소
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>

            <div th:if="${orders == null or orders.isEmpty()}" class="premium-card p-12 text-center">
                <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-700">주문 내역이 없습니다.</h3>
                <p class="text-slate-500 mt-2 text-sm">새로운 상품을 둘러보고 마음에 드는 상품을 주문해보세요.</p>
                <a th:href="@{/}" class="inline-block mt-6 px-6 py-2.5 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition-colors">쇼핑하러 가기</a>
            </div>
        </section>
    </div>
</main>

<div id="trackModal" class="modal-overlay">
    <div class="modal-content">
        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
            </svg>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">운송장 번호 조회</h3>
        <p class="text-slate-500 text-sm mb-6">현재 배송 상태: <span id="modalStatusText" class="font-bold text-blue-600"></span></p>

        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6">
            <p class="text-xs font-bold text-slate-400 mb-1">운송장 번호</p>
            <p id="modalTrackingNumber" class="text-lg font-black tracking-widest text-slate-800">123-456-789</p>
        </div>

        <button onclick="closeModal()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition-colors">확인</button>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>
    function showDeliveryTrack(trackingNumber, status) {
        document.getElementById('modalTrackingNumber').innerText = trackingNumber || '발급대기';
        document.getElementById('modalStatusText').innerText = status || 'READY';
        document.getElementById('trackModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('trackModal').classList.remove('active');
    }

    function requestReturn(orderSeq, companyName) {
        const confirmed = confirm(`${companyName} 묶음의 반품을 신청하시겠습니까?\n주문번호: ${orderSeq}`);
        if (confirmed) {
            alert('반품 신청이 접수되었습니다.');
        }
    }

    function cancelOrder(orderSeq, companyName) {
        const confirmed = confirm(`${companyName} 묶음의 주문을 취소하시겠습니까?\n주문번호: ${orderSeq}`);
        if (confirmed) {
            alert('주문 취소 요청이 접수되었습니다.');
        }
    }

    document.getElementById('trackModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
</script>

</body>
</html>
