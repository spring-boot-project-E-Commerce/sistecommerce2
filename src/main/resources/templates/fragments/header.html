<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Gold Market 공통 헤더. gold-noraidius.html 디자인 기준 (amber + slate).
  사용: <div th:replace="~{fragments/header :: header}"></div>
  ${auth} 는 GlobalModelAdvice 가 세션에서 주입한다 (null = 비로그인).
-->
<header th:fragment="header">
    <!-- 최상단 유틸 바 -->
    <div class="w-full bg-[#fafafa] border-b border-gray-200 text-[11px] text-[#555555]">
        <div class="max-w-screen-wide mx-auto px-4 h-8 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a th:href="@{/hotdeals}" class="text-amber-600 font-bold hover:underline">👑 골드배송</a>
                <a th:href="@{/group-buys}" class="hover:underline">골드프레시</a>
                <a th:href="@{/group-buys/scheduled}" class="hover:underline">골드멤버십 존</a>
            </div>
            <div class="flex items-center space-x-4">
                <th:block th:if="${auth == null}">
                    <a th:href="@{/member/login}" class="hover:underline">로그인</a>
                    <a th:href="@{/member/signup/type}" class="hover:underline">회원가입</a>
                </th:block>
                <th:block th:if="${auth != null}">
                    <a th:href="@{/member/logout}" class="hover:underline">로그아웃</a>
                </th:block>
                <a href="#" class="hover:underline">고객센터</a>
                <a th:href="@{/mypage/orders}" class="hover:underline">마이골드</a>
            </div>
        </div>
    </div>

    <!-- 메인 헤더: 로고 + 검색 + 퀵메뉴 -->
    <header class="w-full bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-screen-wide mx-auto px-4 py-5 flex items-center justify-between gap-10">

            <a th:href="@{/}" class="text-3xl font-black tracking-tighter flex items-center shrink-0">
                <span class="text-slate-900">GOLD</span><span class="text-amber-500">MARKET</span>
            </a>

            <div class="flex-1 max-w-2xl hidden md:block relative">
                <form th:action="@{/products}" method="get" class="relative flex border-[3px] border-amber-500 bg-white z-40">
                    <input type="text" id="header-search-input" name="keyword" autocomplete="off" placeholder="프리미엄 엄선 상품, 가전, 신선식품 검색!"
                           class="w-full px-4 py-2 text-sm focus:outline-none text-gray-900 font-medium placeholder-gray-400"
                           onfocus="document.getElementById('recent-search-dropdown').classList.remove('hidden')" />
                    <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white px-6 flex items-center justify-center transition-colors shrink-0">
                        <i data-lucide="search" class="w-5 h-5 stroke-[2.5]"></i>
                    </button>
                </form>
                <!-- Recent Search Dropdown -->
                <div id="recent-search-dropdown" class="hidden absolute left-0 right-0 top-full bg-white shadow-2xl border border-gray-200 py-3 px-4 z-30 space-y-2 mt-1 rounded-sm">
                    <div class="text-[11px] font-black text-gray-400 flex items-center justify-between pb-1.5 border-b border-gray-100">
                        <span>🕒 최근 검색어</span>
                        <button type="button" class="hover:text-amber-500 hover:underline text-[10px]" onclick="location.href='/products/recent-search/clear'">전체 삭제</button>
                    </div>
                    <ul class="space-y-1.5 text-xs text-gray-700 max-h-60 overflow-y-auto">
                        <li th:each="kw : ${recentKeywords}" class="flex items-center justify-between group">
                            <a th:href="@{/products(keyword=${kw})}" class="hover:text-amber-600 truncate flex-1" th:text="${kw}">검색어</a>
                            <button type="button" class="text-gray-300 hover:text-red-500 font-bold px-1 text-sm transition-colors"
                                    th:onclick="'location.href=\'/products/recent-search/delete?keyword=\' + encodeURIComponent(\'' + ${kw} + '\')'">&times;</button>
                        </li>
                        <li th:if="${#lists.isEmpty(recentKeywords)}" class="text-gray-400 py-4 text-center">최근 검색어가 없습니다.</li>
                    </ul>
                </div>
            </div>

            <div class="flex items-center space-x-7 text-[#555555] shrink-0">
                <a th:href="@{/member}" class="flex flex-col items-center justify-center hover:text-amber-600 text-xs font-semibold">
                    <i data-lucide="user" class="w-5 h-5 stroke-[1.5] mb-0.5"></i>
                    <span>마이골드</span>
                </a>
                <a th:href="@{/cart}" class="flex flex-col items-center justify-center hover:text-amber-600 text-xs font-semibold relative">
                    <i data-lucide="shopping-cart" class="w-5 h-5 stroke-[1.5] mb-0.5"></i>
                    <span>장바구니</span>
                    <span th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}"
                          class="absolute -top-1 -right-2 bg-amber-600 text-white text-[9px] font-bold w-4 h-4 flex items-center justify-center">0</span>
                </a>
            </div>
        </div>

        <!-- 카테고리 네비 -->
        <div class="bg-slate-900 text-white relative">
            <div class="max-w-screen-wide mx-auto px-4 h-10 flex items-center text-sm font-bold relative">
                
                <!-- 카테고리 드롭다운 컨테이너 -->
                <div class="h-full relative">
                    <button id="category-btn" type="button" onclick="document.getElementById('category-dropdown').classList.toggle('hidden')" 
                            class="bg-slate-800 h-full px-6 flex items-center gap-2 hover:bg-slate-700 transition-colors text-amber-400 focus:outline-none">
                        <i data-lucide="menu" class="w-4 h-4"></i> 카테고리
                    </button>
                    <!-- Dropdown Megamenu -->
                    <div id="category-dropdown" class="hidden absolute left-0 top-full bg-white text-gray-800 shadow-2xl border border-gray-200 py-6 px-8 grid grid-cols-3 gap-8 min-w-[650px] z-50 mt-0.5 rounded-sm">
                        <div th:each="cat0 : ${globalCategories}" class="space-y-4">
                            <h3 class="font-black text-sm text-slate-900 border-b-2 border-slate-900 pb-1.5 flex items-center gap-1.5">
                                <span class="w-1.5 h-3.5 bg-amber-500"></span>
                                <span th:text="${cat0.categoryName}">대분류</span>
                            </h3>
                            <div class="space-y-4">
                                <div th:each="cat1 : ${cat0.children}">
                                    <h4 class="font-bold text-xs text-gray-400 mb-1" th:text="${cat1.categoryName}">중분류</h4>
                                    <ul class="space-y-1.5 text-xs text-gray-600 pl-2.5 border-l-2 border-gray-100">
                                        <li th:each="cat2 : ${cat1.children}">
                                            <a th:href="@{/products(categorySeq=${cat2.seq})}" class="block py-0.5 hover:text-amber-600 hover:underline font-medium" th:text="${cat2.categoryName}">소분류</a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center space-x-7 ml-6 text-xs font-semibold text-gray-300">
                    <a th:href="@{/products}" class="hover:text-amber-400">쇼핑몰</a>
                    <a th:href="@{/group-buys}" class="text-amber-400 flex items-center gap-1">
                        <i data-lucide="gem" class="w-3.5 h-3.5 fill-amber-400"></i> 공동구매
                    </a>
                    <a th:href="@{/hotdeals}" class="hover:text-amber-400">핫딜 특가</a>
                    <a th:href="@{/group-buys/scheduled}" class="hover:text-amber-400">공구 예정</a>
                </div>
            </div>
        </div>

        <!-- 클릭 유도 해제 등을 제어하는 범용 클릭 리스너 스크립트 -->
        <script>
            document.addEventListener('click', function(e) {
                // 카테고리 드롭다운 영역 밖 클릭 시 숨김
                const catBtn = document.getElementById('category-btn');
                const catDropdown = document.getElementById('category-dropdown');
                if (catBtn && catDropdown && !catBtn.contains(e.target) && !catDropdown.contains(e.target)) {
                    catDropdown.classList.add('hidden');
                }
                
                // 검색창 드롭다운 영역 밖 클릭 시 숨김
                const searchInput = document.getElementById('header-search-input');
                const searchDropdown = document.getElementById('recent-search-dropdown');
                if (searchInput && searchDropdown && !searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
                    searchDropdown.classList.add('hidden');
                }
            });
        </script>
    </header>
</header>
</body>
</html>
