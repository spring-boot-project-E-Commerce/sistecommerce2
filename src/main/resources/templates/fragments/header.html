<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<!--
  Gold Market 공통 헤더. gold-noraidius.html 디자인 기준 (amber + slate).
  사용: <div th:replace="~{fragments/header :: header}"></div>
  ${auth} 는 GlobalModelAdvice 가 세션에서 주입한다 (null = 비로그인).
-->
<header th:fragment="header">
    <!-- 최상단 유틸 바 -->
    <div class="w-full bg-[#fafafa] border-b border-gray-200 text-[11px] text-[#555555]">
        <div class="max-w-screen-wide mx-auto px-4 h-8 flex items-center justify-between">
            <div class="flex items-center space-x-4">
            </div>
            <div class="flex items-center space-x-4">
                <th:block sec:authorize="!isAuthenticated()">  <!-- 비로그인 -->
                    <a th:href="@{/member/login}" class="hover:underline">로그인</a>
                    <a th:href="@{/member/signup/type}" class="hover:underline">회원가입</a>
                </th:block>
                <th:block sec:authorize="isAuthenticated()">   <!-- 로그인 -->
                    <a th:href="@{/member/logout}" class="hover:underline">로그아웃</a>
                </th:block>
                <a href="#" class="hover:underline">고객센터</a>
            </div>
        </div>
    </div>

    <!-- 메인 헤더: 로고 + 검색 + 퀵메뉴 -->
    <header class="w-full bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-screen-wide mx-auto px-4 py-5 flex items-center justify-between gap-10">

            <a th:href="@{/}" class="text-3xl font-black tracking-tighter flex items-center shrink-0">
                <span class="text-slate-900">GOLD</span><span class="text-amber-500">MARKET</span>
            </a>

            <div class="flex-1 max-w-2xl hidden md:block relative">
                <form th:action="@{/products}" method="get" class="relative flex border-[3px] border-amber-500 bg-white z-40">
                    <!-- 필터 및 카테고리 상태 보존용 hidden 필드 -->
                    <input type="hidden" name="categorySeq" th:if="${categorySeq != null}" th:value="${categorySeq}">
                    <input type="hidden" name="sort" th:if="${sort != null}" th:value="${sort}">
                    <input type="hidden" name="price" th:if="${price != null and price != 'all'}" th:value="${price}">
                    <input type="hidden" name="rating" th:if="${rating != null and rating != ''}" th:value="${rating}">
                    <input type="hidden" name="hideOutOfStock" th:if="${hideOutOfStock}" th:value="${hideOutOfStock}">
                    
                    <input type="text" id="header-search-input" name="keyword" th:value="${keyword}" autocomplete="off" placeholder="프리미엄 엄선 상품, 가전, 신선식품 검색!"
                           class="w-full px-4 py-2 text-sm focus:outline-none text-gray-900 font-medium placeholder-gray-400"
                           onfocus="document.getElementById('recent-search-dropdown').classList.remove('hidden')" />
                    <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white px-6 flex items-center justify-center transition-colors shrink-0">
                        <i data-lucide="search" class="w-5 h-5 stroke-[2.5]"></i>
                    </button>
                </form>
                <!-- Recent Search Dropdown -->
                <div id="recent-search-dropdown" class="hidden absolute left-0 right-0 top-full bg-white shadow-2xl border border-gray-200 py-3 px-4 z-30 space-y-2 mt-1 rounded-sm">
                    <div class="text-[11px] font-black text-gray-400 flex items-center justify-between pb-1.5 border-b border-gray-100">
                        <span>🕒 최근 검색어</span>
                        <button type="button" class="hover:text-amber-500 hover:underline text-[10px]" onclick="clearRecentKeywords(event)">전체 삭제</button>
                    </div>
                    <ul id="recent-search-list" class="space-y-1.5 text-xs text-gray-700 max-h-60 overflow-y-auto">
                        <li th:each="kw : ${recentKeywords}" 
                            th:if="${kw != keyword}"
                            class="flex items-center justify-between group">
                            <a th:href="@{/products(keyword=${kw})}" class="hover:text-amber-600 truncate flex-1" th:text="${kw}">검색어</a>
                            <button type="button" class="text-gray-300 hover:text-red-500 font-bold px-1 text-sm transition-colors"
                                    th:data-keyword="${kw}"
                                    onclick="deleteRecentKeyword(event, this.getAttribute('data-keyword'), this)">&times;</button>
                        </li>
                        <!-- 세션이 비어있거나, 세션에 현재 키워드 딱 하나만 있어서 화면에 노출할 이력이 없을 때 예외처리 -->
                        <li th:if="${#lists.isEmpty(recentKeywords) or (recentKeywords.size() == 1 and recentKeywords[0] == keyword)}" 
                            class="text-gray-400 py-4 text-center no-recent">최근 검색어가 없습니다.</li>
                    </ul>
                </div>
            </div>

            <div class="flex items-center space-x-7 text-[#555555] shrink-0">
                <a th:href="@{/mypage/orders}" class="flex flex-col items-center justify-center hover:text-amber-600 text-xs font-semibold">
                    <i data-lucide="user" class="w-5 h-5 stroke-[1.5] mb-0.5"></i>
                    <span>마이골드</span>
                </a>
                <a th:href="@{/cart}" class="flex flex-col items-center justify-center hover:text-amber-600 text-xs font-semibold relative">
                    <i data-lucide="shopping-cart" class="w-5 h-5 stroke-[1.5] mb-0.5"></i>
                    <span>장바구니</span>
                    <span th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}"
                          class="absolute -top-1 -right-2 bg-amber-600 text-white text-[9px] font-bold w-4 h-4 flex items-center justify-center">0</span>
                </a>
            </div>
        </div>

        <!-- 카테고리 네비 -->
        <div class="bg-slate-900 text-white relative"> 
            <div class="max-w-screen-wide mx-auto px-4 h-10 flex items-center text-sm font-bold relative">
                
                <!-- 카테고리 드롭다운 컨테이너 -->
                <div class="h-full relative">
                    <button id="category-btn" type="button" onclick="document.getElementById('category-dropdown').classList.toggle('hidden')" 
                            class="bg-slate-800 h-full px-6 flex items-center gap-2 hover:bg-slate-700 transition-colors text-amber-400 focus:outline-none">
                        <i data-lucide="menu" class="w-4 h-4"></i> 카테고리
                    </button>
                    <!-- Dropdown Megamenu (Coupang-style cascading) -->
                    <div id="category-dropdown" class="hidden absolute left-0 top-full bg-white text-gray-800 shadow-2xl border border-gray-200 z-50 mt-0.5 rounded-sm p-0 flex h-[450px] min-w-[680px] select-none">
                        <!-- 1. 대분류 Column -->
                        <div class="w-[220px] bg-gray-50 border-r border-gray-200 overflow-y-auto py-2">
                            <ul class="space-y-0.5">
                                <li th:each="cat0 : ${globalCategories}"
                                    class="category-dep0-item px-4 py-3 hover:bg-white hover:text-amber-600 cursor-pointer flex items-center justify-between font-bold text-sm text-gray-700 border-l-4 border-transparent hover:border-amber-500"
                                    th:data-id="${cat0.seq}">
                                    <span th:text="${cat0.categoryName}">대분류</span>
                                    <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>
                                </li>
                            </ul>
                        </div>

                        <!-- 2. 중분류 Column -->
                        <div id="category-dep1-panel" class="w-[230px] bg-white border-r border-gray-100 overflow-y-auto py-2 hidden">
                            <div th:each="cat0 : ${globalCategories}"
                                 th:id="'dep1-list-' + ${cat0.seq}"
                                 class="dep1-list-container hidden space-y-0.5">
                                <div th:each="cat1 : ${cat0.children}"
                                     class="category-dep1-item px-4 py-2.5 hover:bg-gray-50 hover:text-amber-600 cursor-pointer flex items-center justify-between font-bold text-xs text-gray-600 border-l-4 border-transparent hover:border-amber-500"
                                     th:data-id="${cat1.seq}"
                                     th:data-parent-id="${cat0.seq}">
                                    <span th:text="${cat1.categoryName}">중분류</span>
                                    <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-gray-400"></i>
                                </div>
                            </div>
                        </div>

                        <!-- 3. 소분류 Column -->
                        <div id="category-dep2-panel" class="w-[230px] bg-white overflow-y-auto py-2 hidden">
                            <div th:each="cat0 : ${globalCategories}">
                                <div th:each="cat1 : ${cat0.children}"
                                     th:id="'dep2-list-' + ${cat1.seq}"
                                     class="dep2-list-container hidden space-y-0.5">
                                    <a th:each="cat2 : ${cat1.children}"
                                       th:href="@{/products(categorySeq=${cat2.seq})}"
                                       class="block px-6 py-2 text-xs text-gray-600 hover:bg-gray-50 hover:text-amber-600 hover:font-bold font-medium"
                                       th:text="${cat2.categoryName}">
                                        소분류
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center space-x-7 ml-6 text-xs font-semibold text-gray-300">
                    <a th:href="@{/products}" class="hover:text-amber-400">쇼핑몰</a>
                    <a th:href="@{/group-buys}" class="text-amber-400 flex items-center gap-1">
                        <i data-lucide="gem" class="w-3.5 h-3.5 fill-amber-400"></i> 공동구매
                    </a>
                    <a th:href="@{/products(showHotDealsOnly=true)}" class="hover:text-amber-400">핫딜 특가</a>
                    <a th:href="@{/group-buys/scheduled}" class="hover:text-amber-400">공구 예정</a>
                </div>
            </div>
        </div>

        <!-- 카테고리 및 범용 인터랙션 제어 스크립트 -->
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const dep0Items = document.querySelectorAll('.category-dep0-item');
                const dep1Items = document.querySelectorAll('.category-dep1-item');
                
                const dep1Panel = document.getElementById('category-dep1-panel');
                const dep2Panel = document.getElementById('category-dep2-panel');
                
                const activeDep0Classes = ['bg-white', 'text-amber-600', 'border-amber-500'];
                const activeDep1Classes = ['bg-gray-50', 'text-amber-600', 'border-amber-500'];
                
                function activateDep0(item) {
                    // Reset all dep0 items
                    dep0Items.forEach(el => {
                        el.classList.remove(...activeDep0Classes);
                        el.classList.add('border-transparent');
                    });
                    // Reset all dep1 items
                    dep1Items.forEach(el => {
                        el.classList.remove(...activeDep1Classes);
                        el.classList.add('border-transparent');
                    });
                    
                    // Activate current dep0
                    item.classList.remove('border-transparent');
                    item.classList.add(...activeDep0Classes);
                    
                    const cat0Id = item.getAttribute('data-id');

                    // Hide all dep1 list containers
                    document.querySelectorAll('.dep1-list-container').forEach(el => el.classList.add('hidden'));
                    // Hide all dep2 list containers
                    document.querySelectorAll('.dep2-list-container').forEach(el => el.classList.add('hidden'));
                    
                    // Show current dep1 list container
                    const targetDep1List = document.getElementById('dep1-list-' + cat0Id);
                    if (targetDep1List) {
                        targetDep1List.classList.remove('hidden');
                        dep1Panel.classList.remove('hidden');
                    } else {
                        dep1Panel.classList.add('hidden');
                    }
                    
                    // Hide dep2 panel initially
                    dep2Panel.classList.add('hidden');
                }
                
                function activateDep1(item) {
                    // Reset all dep1 items
                    dep1Items.forEach(el => {
                        el.classList.remove(...activeDep1Classes);
                        el.classList.add('border-transparent');
                    });
                    
                    // Activate current dep1
                    item.classList.remove('border-transparent');
                    item.classList.add(...activeDep1Classes);
                    
                    const cat1Id = item.getAttribute('data-id');
                    
                    // Hide all dep2 list containers
                    document.querySelectorAll('.dep2-list-container').forEach(el => el.classList.add('hidden'));
                    
                    // Show current dep2 list container
                    const targetDep2List = document.getElementById('dep2-list-' + cat1Id);
                    if (targetDep2List) {
                        targetDep2List.classList.remove('hidden');
                        dep2Panel.classList.remove('hidden');
                    } else {
                        dep2Panel.classList.add('hidden');
                    }
                }
                
                // Bind event listeners to Dep0
                dep0Items.forEach(item => {
                    item.addEventListener('mouseenter', () => activateDep0(item));
                    item.addEventListener('click', () => activateDep0(item));
                });
                
                // Bind event listeners to Dep1
                dep1Items.forEach(item => {
                    item.addEventListener('mouseenter', () => activateDep1(item));
                    item.addEventListener('click', () => activateDep1(item));
                });
            });

            document.addEventListener('click', function(e) {
                // 카테고리 드롭다운 영역 밖 클릭 시 숨김
                const catBtn = document.getElementById('category-btn');
                const catDropdown = document.getElementById('category-dropdown');
                if (catBtn && catDropdown && !catBtn.contains(e.target) && !catDropdown.contains(e.target)) {
                    catDropdown.classList.add('hidden');
                }
                
                // 검색창 드롭다운 영역 밖 클릭 시 숨김
                const searchInput = document.getElementById('header-search-input');
                const searchDropdown = document.getElementById('recent-search-dropdown');
                if (searchInput && searchDropdown && !searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
                    searchDropdown.classList.add('hidden');
                }
            });

            function deleteRecentKeyword(event, keyword, buttonEl) {
                event.preventDefault();
                event.stopPropagation();
                
                fetch('/products/recent-search/delete?keyword=' + encodeURIComponent(keyword))
                    .then(response => {
                        if (response.ok) {
                            const li = buttonEl.closest('li');
                            if (li) {
                                li.remove();
                            }
                            const list = document.getElementById('recent-search-list');
                            if (list && list.querySelectorAll('li:not(.no-recent)').length === 0) {
                                list.innerHTML = '<li class="text-gray-400 py-4 text-center no-recent">최근 검색어가 없습니다.</li>';
                            }
                        } else {
                            console.error('Failed to delete recent search keyword');
                        }
                    })
                    .catch(error => console.error('Error:', error));
            }

            function clearRecentKeywords(event) {
                event.preventDefault();
                event.stopPropagation();
                
                fetch('/products/recent-search/clear')
                    .then(response => {
                        if (response.ok) {
                            const list = document.getElementById('recent-search-list');
                            if (list) {
                                list.innerHTML = '<li class="text-gray-400 py-4 text-center no-recent">최근 검색어가 없습니다.</li>';
                            }
                        } else {
                            console.error('Failed to clear recent search keywords');
                        }
                    })
                    .catch(error => console.error('Error:', error));
            }
        </script>
    </header>
</header>
</body>
</html>
