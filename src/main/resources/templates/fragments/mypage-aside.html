<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!-- 
  마이페이지 공통 사이드바 (aside)
  사용법: <div th:replace="~{fragments/mypage-aside :: aside('orders')}"></div>
  매개변수 activeMenu에 따라 현재 메뉴가 하이라이트됩니다.
-->
<aside th:fragment="aside(activeMenu)" class="bg-white/80 backdrop-blur-md border border-gray-100 rounded-2xl shadow-sm text-sm h-fit overflow-hidden">
    <div class="px-6 py-5 bg-gradient-to-r from-amber-50 to-white border-b border-gray-100">
        <h2 class="text-lg font-black text-gray-900 tracking-tight">마이골드 <span class="text-amber-500">✨</span></h2>
    </div>
    
    <nav class="py-3 flex flex-col gap-1 px-3">
        <a th:href="@{/mypage/orders}" 
           th:class="${activeMenu == 'orders'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">주문목록/배송조회</span>
            <svg th:if="${activeMenu == 'orders'}" class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </a>
        
        <a href="#" th:class="${activeMenu == 'returns'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">취소/반품/교환/환불내역</span>
        </a>
        
        <a href="#" th:class="${activeMenu == 'membership'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">멤버십</span>
        </a>
        
        <a href="#" th:class="${activeMenu == 'receipts'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">영수증 조회/출력</span>
        </a>
        
        <a href="#" th:class="${activeMenu == 'coupons'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">쿠폰</span>
        </a>
        
        <a href="#" th:class="${activeMenu == 'inquiries'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">문의</span>
        </a>
        
        <a href="#" th:class="${activeMenu == 'reviews'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">리뷰관리</span>
        </a>
        
        <a th:href="@{/cart}" th:class="${activeMenu == 'cart'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">장바구니</span>
        </a>
        
        <a href="#" th:class="${activeMenu == 'profile'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">개인정보확인/수정</span>
        </a>
        
        <a href="#" th:class="${activeMenu == 'payments'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">결제수단 관리</span>
        </a>
        
        <a href="#" th:class="${activeMenu == 'address'} ? 'group flex items-center px-4 py-3 font-bold text-amber-600 bg-amber-50/50 rounded-xl transition-all' : 'group flex items-center px-4 py-3 font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-all'">
            <span class="flex-1">배송지 관리</span>
        </a>
    </nav>
</aside>
</html>
