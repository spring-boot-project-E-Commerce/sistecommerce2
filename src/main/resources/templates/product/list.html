<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Gold Market | 상품목록')}"></head>
<body class="bg-[#f5f6f9] text-gray-900 font-sans antialiased min-h-screen">

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-screen-wide mx-auto px-4 mt-8 pb-32 flex flex-col lg:flex-row gap-6 items-start">

    <aside class="w-full lg:w-64 flex-shrink-0 bg-white p-5 border border-gray-200">
        <div class="mb-8">
            <h2 class="text-base font-black text-slate-900 border-b-2 border-slate-900 pb-2 mb-4 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-amber-500"></span> SORT BY
            </h2>
            <ul class="space-y-2 text-sm font-bold text-gray-700">
                <li>
                    <a th:href="@{/products(categorySeq=${categorySeq}, keyword=${keyword}, sort='salesDesc')}" 
                       class="block px-3 py-2 border transition-colors"
                       th:classappend="${sort == null or sort == 'salesDesc' or sort == ''} ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-gray-200 hover:border-amber-500 hover:text-amber-500'">
                        ✓ 판매량순
                    </a>
                </li>
                <li>
                    <a th:href="@{/products(categorySeq=${categorySeq}, keyword=${keyword}, sort='priceAsc')}" 
                       class="block px-3 py-2 border transition-colors"
                       th:classappend="${sort == 'priceAsc'} ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-gray-200 hover:border-amber-500 hover:text-amber-500'">
                        낮은 가격순
                    </a>
                </li>
                <li>
                    <a th:href="@{/products(categorySeq=${categorySeq}, keyword=${keyword}, sort='priceDesc')}" 
                       class="block px-3 py-2 border transition-colors"
                       th:classappend="${sort == 'priceDesc'} ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-gray-200 hover:border-amber-500 hover:text-amber-500'">
                        높은 가격순
                    </a>
                </li>
                <li>
                    <a th:href="@{/products(categorySeq=${categorySeq}, keyword=${keyword}, sort='newest')}" 
                       class="block px-3 py-2 border transition-colors"
                       th:classappend="${sort == 'newest'} ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-gray-200 hover:border-amber-500 hover:text-amber-500'">
                        최신순
                    </a>
                </li>
                <li>
                    <a th:href="@{/products(categorySeq=${categorySeq}, keyword=${keyword}, sort='ratingDesc')}" 
                       class="block px-3 py-2 border transition-colors"
                       th:classappend="${sort == 'ratingDesc'} ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-gray-200 hover:border-amber-500 hover:text-amber-500'">
                        별점순
                    </a>
                </li>
            </ul>
        </div>

        <div>
            <h2 class="text-base font-black text-slate-900 border-b-2 border-slate-900 pb-2 mb-4 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-slate-900"></span> FILTER
            </h2>
            
            <form action="/products" method="get" class="space-y-6">
                <div>
                    <label class="flex items-center gap-2 text-sm font-bold text-gray-800 cursor-pointer">
                        <input type="checkbox" name="hotdeal" value="true" class="w-4 h-4 text-amber-500 focus:ring-amber-500 border-gray-300 rounded-none">
                        🔥 핫딜 상품만 보기
                    </label>
                </div>

                <div>
                    <h3 class="text-xs font-bold text-gray-500 mb-2">가격 (Price)</h3>
                    <div class="space-y-2 text-sm">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="price" value="all" checked class="text-slate-900 focus:ring-slate-900"> 전체</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="price" value="0-10000" class="text-slate-900 focus:ring-slate-900"> 1만원 이하</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="price" value="10000-50000" class="text-slate-900 focus:ring-slate-900"> 1만원 ~ 5만원</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="price" value="50000-100000" class="text-slate-900 focus:ring-slate-900"> 5만원 ~ 10만원</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="price" value="100000-max" class="text-slate-900 focus:ring-slate-900"> 10만원 이상</label>
                    </div>
                </div>

                <div>
                    <h3 class="text-xs font-bold text-gray-500 mb-2">별점 (Rating)</h3>
                    <div class="space-y-2 text-sm">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="rating" value="4" class="text-slate-900 rounded-none focus:ring-slate-900"> ⭐⭐⭐⭐ 4점 이상</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="rating" value="3" class="text-slate-900 rounded-none focus:ring-slate-900"> ⭐⭐⭐ 3점 이상</label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-2 transition-colors">
                    조건 검색
                </button>
            </form>
        </div>
    </aside>

    <section class="flex-1 min-w-0">
        


        <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4">
            
            <a th:each="p : ${productList}" th:href="@{/products/{seq}(seq=${p.seq})}"
               class="bg-white p-2 flex flex-col justify-between group cursor-pointer border border-transparent hover:border-amber-400 transition-colors relative"
               th:classappend="${p.status == 'SOLD_OUT'} ? 'opacity-60' : ''">
                
                <div th:if="${p.status == 'SOLD_OUT'}" class="absolute inset-0 z-10 flex items-center justify-center bg-white/50 backdrop-blur-[1px]">
                    <span class="bg-slate-900 text-white font-black px-4 py-1.5 text-sm tracking-widest border-2 border-white shadow-lg">품절</span>
                </div>

                <div class="aspect-square bg-gray-50 relative overflow-hidden">
                    <img th:src="${p.image}" alt="상품 이미지" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
                </div>
                <div class="pt-3 space-y-1.5">
                    <h4 th:text="${p.name}" class="text-xs text-gray-700 line-clamp-2 leading-normal group-hover:text-amber-600 group-hover:underline">상품명이 여기에 표시됩니다. 두 줄까지 가능합니다.</h4>
                    <div>
                        <div th:if="${p.originalPrice > p.price}" th:text="${#numbers.formatInteger(p.originalPrice, 0, 'COMMA')} + '원'"
                             class="text-[11px] text-gray-400 line-through">0원</div>
                        <div class="flex items-baseline gap-1">
                            <span th:if="${p.discountRate > 0}" th:text="${p.discountRate} + '%'" class="text-red-500 font-black text-sm">0%</span>
                            <span th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')}" class="text-slate-900 font-extrabold text-base">0</span>
                            <span class="text-xs font-bold text-slate-900">원</span>
                        </div>
                        <div class="mt-1 flex items-center gap-1 text-[10px] text-gray-400">
                            <span class="text-amber-500 font-bold" th:text="${p.averageRating}">⭐ 0.0</span>
                            <span th:text="'(' + ${#numbers.formatInteger(p.reviewCount, 0, 'COMMA')} + ')'">(0)</span>
                        </div>
                    </div>
                </div>
            </a>
            
            <div th:if="${#lists.isEmpty(productList)}" class="col-span-full py-20 text-center text-gray-500">
                <p>검색 조건에 맞는 상품이 없습니다.</p>
            </div>
        </div>

        <div th:if="${not #lists.isEmpty(productList)}" class="mt-12 flex justify-center items-center gap-1 text-sm font-bold">
            <!-- 이전 페이지 -->
            <a th:if="${productPage.hasPrevious()}" 
               th:href="@{/products(categorySeq=${categorySeq}, keyword=${keyword}, sort=${sort}, page=${productPage.number - 1})}" 
               class="px-3 py-1 text-gray-600 hover:text-amber-600 mr-2">&larr; Previous</a>
            <span th:unless="${productPage.hasPrevious()}" 
                  class="px-3 py-1 text-gray-400 mr-2">&larr; Previous</span>
                  
            <!-- 페이지 번호 목록 -->
            <th:block th:if="${productPage.totalPages > 0}">
                <a th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                   th:href="@{/products(categorySeq=${categorySeq}, keyword=${keyword}, sort=${sort}, page=${i})}"
                   class="w-8 h-8 flex items-center justify-center border font-bold"
                   th:classappend="${i == productPage.number} ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-gray-200 text-gray-600 hover:border-amber-500 hover:text-amber-600'"
                   th:text="${i + 1}">1</a>
            </th:block>
            
            <!-- 다음 페이지 -->
            <a th:if="${productPage.hasNext()}" 
               th:href="@{/products(categorySeq=${categorySeq}, keyword=${keyword}, sort=${sort}, page=${productPage.number + 1})}" 
               class="px-3 py-1 text-gray-600 hover:text-amber-600 ml-2">Next &rarr;</a>
            <span th:unless="${productPage.hasNext()}" 
                  class="px-3 py-1 text-gray-400 ml-2">Next &rarr;</span>
        </div>
    </section>

    <aside class="hidden xl:flex w-52 flex-col gap-6 flex-shrink-0">
        <div class="bg-white p-4 border border-gray-200 shadow-sm">
            <h3 class="text-xs font-black text-slate-900 mb-3 pb-2 border-b border-gray-100">🔥 추천 상품 목록</h3>
            <ul class="space-y-3">
                <li th:each="r : ${recommendedList}">
                    <a th:href="@{/products/{seq}(seq=${r.seq})}" class="group block">
                        <h4 th:text="${r.name}" class="text-[11px] text-gray-700 truncate group-hover:text-amber-600 group-hover:underline">추천상품명</h4>
                        <div class="flex justify-between items-baseline mt-0.5">
                            <span th:text="${#numbers.formatInteger(r.price, 0, 'COMMA')} + '원'" class="text-xs font-bold text-slate-900">0원</span>
                            <span class="text-[10px] text-red-500 font-bold flex items-center">⇧ 1</span>
                        </div>
                    </a>
                </li>
            </ul>
        </div>

        <div class="bg-white p-4 border border-gray-200 shadow-sm sticky top-24">
            <h3 class="text-xs font-black text-slate-900 mb-3 pb-2 border-b border-gray-100">🕒 최근 조회 상품</h3>
            <ul class="space-y-4">
                <li th:each="rv : ${recentViewedList}">
                    <a th:href="@{/products/{seq}(seq=${rv.seq})}" class="group flex gap-2 items-center">
                        <div class="w-10 h-10 bg-gray-100 flex-shrink-0">
                            <img th:src="${rv.image}" class="w-full h-full object-cover">
                        </div>
                        <div class="min-w-0">
                            <h4 th:text="${rv.name}" class="text-[11px] text-gray-700 truncate group-hover:text-amber-600 group-hover:underline">최근본상품명</h4>
                            <p th:text="${#numbers.formatInteger(rv.price, 0, 'COMMA')} + '원'" class="text-xs font-bold text-slate-900 mt-0.5">0원</p>
                        </div>
                    </a>
                </li>
            </ul>
        </div>
    </aside>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>s
